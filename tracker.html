<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tracker — GrowStars</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #f5f1ea;
      color: #1a1208;
      min-height: 100vh;
    }

    /* TOPBAR */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      border-bottom: 1px solid rgba(0,0,0,0.08);
      background: #f5f1ea;
    }

    .topbar-left { display: flex; align-items: center; gap: 16px; }

    .brand {
      font-size: 13px;
      font-weight: 600;
      color: #1a1208;
      text-decoration: none;
    }

    .brand span { color: #D4A43A; }

    .page-title {
      font-size: 12px;
      font-weight: 500;
      color: #7a6e62;
      letter-spacing: 0.04em;
    }

    .nav-link {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #7a6e62;
      text-decoration: none;
      padding: 4px 10px;
      border: 0.5px solid #d4c9b0;
      border-radius: 3px;
    }

    .nav-link:hover { color: #1a1208; }

    /* MAIN */
    .main {
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 24px 80px;
    }

    .main-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .main-title {
      font-size: 13px;
      font-weight: 600;
      color: #1a1208;
      letter-spacing: 0.04em;
    }

    .count-label {
      font-size: 11px;
      color: #b0a492;
    }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 60px 24px;
      color: #b0a492;
      font-size: 13px;
    }

    /* TABLE */
    .tracker-wrap {
      background: #fff;
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 8px;
      overflow: hidden;
    }

    .tracker-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .tracker-table th {
      text-align: left;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #b0a492;
      padding: 10px 12px;
      border-bottom: 1px solid rgba(0,0,0,0.08);
      background: #faf8f4;
      white-space: nowrap;
    }

    .tracker-table td {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(0,0,0,0.05);
      vertical-align: middle;
      color: #1a1208;
    }

    .tracker-table tr:last-child td { border-bottom: none; }

    /* ROW STATES */
    tr.row-overdue  td { background: rgba(220,53,69,0.04); }
    tr.row-followup td { background: rgba(212,164,58,0.06); }

    /* BUSINESS + CONTACT */
    .biz-name {
      font-weight: 500;
      font-size: 12px;
    }

    .contact-name {
      font-size: 11px;
      color: #7a6e62;
    }

    /* CHANNEL BADGE */
    .channel-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 10px;
      background: rgba(10,102,194,0.1);
      color: #0a66c2;
      letter-spacing: 0.03em;
    }

    /* ANGLE BADGE */
    .angle-badge {
      display: inline-block;
      margin-top: 4px;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 1px 6px;
      border-radius: 8px;
      background: rgba(0,0,0,0.05);
      color: #7a6e62;
    }

    /* DATE */
    .sent-date {
      font-size: 11px;
      color: #7a6e62;
      white-space: nowrap;
    }

    /* STATUS DROPDOWN */
    .status-select {
      font-family: inherit;
      font-size: 11px;
      font-weight: 500;
      padding: 3px 6px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      outline: none;
    }

    .status-waiting      { background: rgba(0,0,0,0.06);      color: #7a6e62; }
    .status-replied      { background: rgba(10,102,194,0.1);  color: #0a66c2; }
    .status-loom         { background: rgba(107,70,193,0.1);  color: #6b46c1; }
    .status-call         { background: rgba(40,167,69,0.1);   color: #1e7e34; }
    .status-closed-won   { background: rgba(40,167,69,0.15);  color: #155724; }
    .status-not-interested { background: rgba(220,53,69,0.08); color: #c82333; }

    /* FOLLOW-UP BADGE */
    .followup-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 10px;
      white-space: nowrap;
    }

    .followup-overdue  { background: rgba(220,53,69,0.1);  color: #c82333; }
    .followup-due      { background: rgba(212,164,58,0.15); color: #9a7520; }
    .followup-ok       { color: #b0a492; font-size: 10px; font-weight: 400; }

    /* LAST ACTION */
    .last-action {
      font-size: 11px;
      color: #7a6e62;
    }

    /* NOTES INPUT */
    .notes-input {
      font-family: inherit;
      font-size: 11px;
      color: #1a1208;
      background: transparent;
      border: none;
      outline: none;
      width: 140px;
      padding: 2px 4px;
      border-radius: 3px;
    }

    .notes-input:focus {
      background: rgba(0,0,0,0.04);
    }

    .notes-input::placeholder { color: #c4bdb5; }

    /* DELETE */
    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #c4bdb5;
      font-size: 14px;
      padding: 2px 4px;
      line-height: 1;
      border-radius: 3px;
    }

    .delete-btn:hover { color: #c82333; background: rgba(220,53,69,0.08); }

    /* LOOM BUTTON */
    .loom-btn {
      font-family: inherit;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.04em;
      padding: 3px 8px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      background: rgba(107,70,193,0.1);
      color: #6b46c1;
      white-space: nowrap;
    }

    .loom-btn:hover { background: rgba(107,70,193,0.18); }

    /* MODAL */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-backdrop.open { display: flex; }

    .modal {
      background: #fff;
      border-radius: 10px;
      padding: 28px;
      width: 100%;
      max-width: 520px;
      margin: 24px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.14);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .modal-title {
      font-size: 13px;
      font-weight: 600;
      color: #1a1208;
    }

    .modal-meta {
      font-size: 11px;
      color: #b0a492;
      margin-top: 2px;
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 18px;
      color: #b0a492;
      cursor: pointer;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 3px;
    }

    .modal-close:hover { color: #1a1208; }

    .modal-script {
      font-size: 12px;
      line-height: 1.7;
      color: #1a1208;
      white-space: pre-wrap;
      background: #faf8f4;
      border: 1px solid rgba(0,0,0,0.07);
      border-radius: 6px;
      padding: 16px;
      max-height: 460px;
      overflow-y: auto;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }

    .modal-copy-btn {
      font-family: inherit;
      font-size: 11px;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 5px;
      border: 1px solid #d4c9b0;
      background: #fff;
      color: #1a1208;
      cursor: pointer;
    }

    .modal-copy-btn:hover { background: #f5f1ea; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <a class="brand" href="lead-runner.html">Grow<span>Stars</span></a>
    <span class="page-title">Tracker</span>
  </div>
  <div style="display:flex;align-items:center;gap:8px;">
    <a class="nav-link" href="index.html">LinkedIn Assist</a>
    <a class="nav-link" href="lead-runner.html">Lead Runner</a>
  </div>
</div>

<div class="main">
  <div class="main-header">
    <span class="main-title">Outreach Tracker</span>
    <span class="count-label" id="count-label"></span>
  </div>

  <div id="empty-state" class="empty-state" style="display:none;">
    No prospects tracked yet. Add one from LinkedIn Assist.
  </div>

  <div class="tracker-wrap" id="tracker-wrap" style="display:none;">
    <table class="tracker-table">
      <thead>
        <tr>
          <th>Business</th>
          <th>Contact</th>
          <th>Channel</th>
          <th>Sent Date</th>
          <th>Status</th>
          <th>Follow-up</th>
          <th>Last Action</th>
          <th>Notes</th>
          <th></th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tracker-tbody"></tbody>
    </table>
  </div>
</div>

<!-- Loom Script Modal -->
<div class="modal-backdrop" id="loom-modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modal-title">Loom Script</div>
        <div class="modal-meta" id="modal-meta"></div>
      </div>
      <button class="modal-close" onclick="closeLoomModal()">×</button>
    </div>
    <div class="modal-script" id="modal-script"></div>
    <div class="modal-actions">
      <button class="modal-copy-btn" onclick="copyScript()">Copy script</button>
    </div>
  </div>
</div>

<script>
  const TRACKER_KEY = 'growstars_tracker';

  const STATUS_META = {
    'Waiting':        { cls: 'status-waiting',       label: 'Waiting' },
    'Replied':        { cls: 'status-replied',        label: 'Replied' },
    'Loom Sent':      { cls: 'status-loom',           label: 'Loom Sent' },
    'Call Booked':    { cls: 'status-call',           label: 'Call Booked' },
    'Closed Won':     { cls: 'status-closed-won',     label: 'Closed Won' },
    'Not Interested': { cls: 'status-not-interested', label: 'Not Interested' },
  };

  const STATUS_OPTIONS = Object.keys(STATUS_META);
  const ANGLE_LABELS  = ['Velocity', 'Competition', 'Opportunity', 'Visibility'];

  function load() {
    try { return JSON.parse(localStorage.getItem(TRACKER_KEY) || '[]'); }
    catch { return []; }
  }

  function save(data) {
    localStorage.setItem(TRACKER_KEY, JSON.stringify(data));
  }

  function daysSince(dateStr) {
    const sent = new Date(dateStr);
    const now  = new Date();
    return Math.floor((now - sent) / 86400000);
  }

  function followupBadge(entry) {
    if (entry.status !== 'Waiting') return `<span class="followup-ok">–</span>`;
    const days = daysSince(entry.sent_date);
    if (days >= 7) return `<span class="followup-badge followup-overdue">Overdue</span>`;
    if (days >= 2) return `<span class="followup-badge followup-due">Follow up</span>`;
    return `<span class="followup-ok">–</span>`;
  }

  function rowClass(entry) {
    if (entry.status !== 'Waiting') return '';
    const days = daysSince(entry.sent_date);
    if (days >= 7) return 'row-overdue';
    if (days >= 2) return 'row-followup';
    return '';
  }

  function formatDate(dateStr) {
    const d = new Date(dateStr);
    return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
  }

  function statusSelectHTML(currentStatus) {
    const meta = STATUS_META[currentStatus] || STATUS_META['Waiting'];
    const options = STATUS_OPTIONS.map(s =>
      `<option value="${s}"${s === currentStatus ? ' selected' : ''}>${s}</option>`
    ).join('');
    return `<select class="status-select ${meta.cls}" onchange="updateStatus(this)">${options}</select>`;
  }

  function render() {
    const data  = load();
    const tbody = document.getElementById('tracker-tbody');
    const empty = document.getElementById('empty-state');
    const wrap  = document.getElementById('tracker-wrap');
    const count = document.getElementById('count-label');

    if (!data.length) {
      empty.style.display = 'block';
      wrap.style.display  = 'none';
      count.textContent   = '';
      return;
    }

    empty.style.display = 'none';
    wrap.style.display  = 'block';
    count.textContent   = `${data.length} prospect${data.length !== 1 ? 's' : ''}`;

    const LOOM_STATUSES = new Set(['Replied', 'Loom Sent']);

    tbody.innerHTML = data.map((entry, i) => {
      const loomBtn = LOOM_STATUSES.has(entry.status)
        ? `<button class="loom-btn" onclick="openLoomModal(${i})">Loom script</button>`
        : '';
      return `
        <tr class="${rowClass(entry)}" data-index="${i}">
          <td>
            <div class="biz-name">${entry.business}</div>
            ${entry.angle != null ? `<span class="angle-badge">${ANGLE_LABELS[entry.angle] || ''}</span>` : ''}
            ${entry.maps_link ? `<a href="${entry.maps_link}" target="_blank" style="font-size:10px;color:#b0a492;text-decoration:none;display:block;margin-top:3px;" title="Google Business Profile">GBP ↗</a>` : ''}
          </td>
          <td><div class="contact-name">${entry.contact || '–'}</div></td>
          <td><span class="channel-badge">${entry.channel}</span></td>
          <td><span class="sent-date">${formatDate(entry.sent_date)}</span></td>
          <td>${statusSelectHTML(entry.status)}</td>
          <td>${followupBadge(entry)}</td>
          <td><span class="last-action">${entry.last_action || '–'}</span></td>
          <td><input class="notes-input" type="text" placeholder="Add a note..." value="${entry.notes || ''}" onchange="updateNotes(this)" data-index="${i}" /></td>
          <td>${loomBtn}</td>
          <td><button class="delete-btn" onclick="deleteEntry(${i})" title="Remove">×</button></td>
        </tr>`;
    }).join('');
  }

  function updateStatus(select) {
    const row   = select.closest('tr');
    const index = parseInt(row.dataset.index);
    const data  = load();
    data[index].status      = select.value;
    data[index].last_action = `Status set to ${select.value}`;
    save(data);
    render();
  }

  function updateNotes(input) {
    const index = parseInt(input.dataset.index);
    const data  = load();
    data[index].notes = input.value;
    save(data);
  }

  function deleteEntry(index) {
    const data = load();
    data.splice(index, 1);
    save(data);
    render();
  }

  function buildLoomScript({ bizName, rating, reviews, lastReviewDays, hasStronger, angle, contact }) {
    const name = contact || 'there';

    let scenario;
    if (angle === 1)                                         scenario = 'competition';
    else if (angle === 2)                                    scenario = 'opportunity';
    else if (angle === 3)                                    scenario = 'velocity';
    else if (lastReviewDays !== null && lastReviewDays > 60) scenario = 'velocity';
    else if (hasStronger)                                    scenario = 'competition';
    else if (rating <= 4.3)                                  scenario = 'low_rating';
    else                                                     scenario = 'opportunity';

    const slide2 = {
      velocity:    `It looks like your reviews have slowed down recently.\n\nIf I scroll here, you were getting reviews more often before, but now there are bigger gaps.`,
      competition: `I noticed nearby spots are getting more reviews than you.\n\nEven if your service is great, Google tends to rank the more active profiles higher. So they end up getting more visibility and more bookings.`,
      opportunity: `You're already in a strong position, ${rating} stars with ${reviews} reviews.\n\nYour rating is great, which means people clearly like your service. The opportunity here is to turn that into more reviews consistently.`,
      low_rating:  `Your rating at ${rating} stars suggests something might be holding it back.\n\nEven a small drop in rating can reduce trust and clicks. So even if you're getting traffic, fewer people convert.`,
    }[scenario];

    const s = [
      `SLIDE 1 — Hook\n[Visual: Google page of their business]\n\n"Hey ${name}, I had a quick look at your Google reviews and wanted to show you something I noticed."`,

      `SLIDE 2 — What I Noticed\n[Visual: Scroll reviews, show numbers]\n\n"${slide2}"`,

      `SLIDE 3 — What's Happening\n[Visual: Scroll older vs recent reviews]\n\n"Google pushes businesses that get reviews consistently.\nWhen that slows down, or others get more, you start losing visibility."`,

      `SLIDE 4 — Why It Matters\n[Visual: Search results / map pack]\n\n"This affects how many people find you...\nwhich directly impacts how many bookings you get."`,

      `SLIDE 5 — What's Causing It\n[Visual: Stay on page]\n\n"Usually it's not that clients don't want to leave reviews...\nit's just that there's no system to get them consistently."`,

      `SLIDE 6 — What To Do Instead\n[Visual: Notes / simple diagram]\n\n"What works is having a simple way to ask every happy client at the right moment...\nso reviews come in consistently without chasing."`,

      `SLIDE 7 — Soft CTA\n[Visual: Back to their profile]\n\n"If you want, I can show you how to set this up for your shop.\nTakes a few minutes to explain."`,
    ];

    return s.join('\n\n' + '─'.repeat(40) + '\n\n');
  }

  function openLoomModal(index) {
    const data  = load();
    const entry = data[index];
    document.getElementById('modal-title').textContent = `Loom Script — ${entry.business}`;
    document.getElementById('modal-meta').textContent  = entry.contact ? `For ${entry.contact}` : '';
    document.getElementById('modal-script').textContent = buildLoomScript(entry);
    document.getElementById('loom-modal').classList.add('open');
  }

  function closeLoomModal() {
    document.getElementById('loom-modal').classList.remove('open');
  }

  function closeModal(e) {
    if (e.target === document.getElementById('loom-modal')) closeLoomModal();
  }

  function copyScript() {
    const text = document.getElementById('modal-script').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector('.modal-copy-btn');
      btn.textContent = 'Copied';
      setTimeout(() => { btn.textContent = 'Copy script'; }, 2000);
    });
  }

  render();
</script>

</body>
</html>
