<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Grow Stars — Audit Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --cream:#fffdf8;--white:#ffffff;--surface:#f7f5f0;--surface2:#efede7;
  --border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.16);
  --text:#1a1a1a;--muted:#6b6560;--hint:#b0a89e;
  --gold:#c8a96e;--gold-dim:rgba(200,169,110,0.15);--gold-dark:#a8863e;
  --green:#2d7a47;--green-dim:rgba(45,122,71,0.10);
  --amber:#b56520;--amber-dim:rgba(181,101,32,0.10);
  --red:#b53030;--red-dim:rgba(181,48,48,0.10);
  --shadow-sm:0 1px 4px rgba(0,0,0,0.07),0 2px 10px rgba(0,0,0,0.04);
  --shadow:0 2px 10px rgba(0,0,0,0.09),0 8px 28px rgba(0,0,0,0.05);
}
html{background:var(--cream);color:var(--text);font-family:'DM Sans',Arial,sans-serif;font-size:16px;line-height:1.6;}
body{min-height:100vh;display:flex;flex-direction:column;}

/* ── NAV ── */
nav{display:flex;align-items:center;justify-content:space-between;padding:.9rem 2rem;border-bottom:1px solid var(--border2);position:sticky;top:0;z-index:20;background:rgba(255,253,248,0.97);backdrop-filter:blur(12px);}
.logo{font-family:Georgia,serif;font-size:18px;letter-spacing:-.01em;}
.logo span{color:var(--gold);}
.nav-tabs{display:flex;gap:4px;}
.nav-tab{font-size:13px;color:var(--muted);padding:6px 14px;border-radius:8px;border:none;background:transparent;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;font-weight:500;}
.nav-tab:hover{color:var(--text);background:var(--surface);}
.nav-tab.active{color:var(--gold);background:var(--gold-dim);font-weight:600;}

/* ── PAGES ── */
.page{display:none;flex:1;flex-direction:column;}
.page.active{display:flex;}

/* ── BUTTONS ── */
.btn{font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;padding:9px 18px;border-radius:10px;border:1px solid var(--border2);background:var(--white);color:var(--text);cursor:pointer;transition:all .18s;white-space:nowrap;display:inline-flex;align-items:center;gap:6px;}
.btn:hover{background:var(--surface);}
.btn:active{transform:scale(0.97);}
.btn:disabled{opacity:.5;cursor:default;}
.btn-primary{background:var(--gold);color:#1a1a1a;border-color:var(--gold);font-weight:600;}
.btn-primary:hover{background:var(--gold-dark);border-color:var(--gold-dark);}
.btn-dark{background:#1a1a1a;color:#fff;border-color:#1a1a1a;font-weight:600;}
.btn-dark:hover{background:#2e2e2e;}
.btn-ghost{background:transparent;border-color:transparent;color:var(--muted);}
.btn-ghost:hover{background:var(--surface);border-color:var(--border);}
.btn-green{background:var(--green-dim);color:var(--green);border-color:rgba(45,122,71,.3);font-weight:600;}
.btn-green:hover{background:rgba(45,122,71,.18);}
.btn-red{background:var(--red-dim);color:var(--red);border-color:rgba(181,48,48,.3);}
.btn-red:hover{background:rgba(181,48,48,.18);}
.btn-sm{padding:6px 12px;font-size:13px;border-radius:8px;}
.btn-xs{padding:4px 9px;font-size:12px;border-radius:7px;}
.btn-icon{padding:7px 11px;border-radius:9px;}

/* ── SEARCH ── */
.search-wrap{max-width:600px;margin:4rem auto 2rem;padding:0 1.5rem;width:100%;}
.search-title{font-family:Georgia,serif;font-size:32px;letter-spacing:-.02em;margin-bottom:.5rem;}
.search-sub{font-size:15px;color:var(--muted);margin-bottom:2rem;}
.search-card{background:var(--white);border:1px solid var(--border2);border-radius:16px;padding:1.25rem;box-shadow:var(--shadow-sm);}
.input-row{display:flex;gap:8px;}
.search-input{flex:1;background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:11px 14px;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s;}
.search-input::placeholder{color:var(--hint);}
.search-input:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-dim);}
.search-results{margin-top:8px;display:flex;flex-direction:column;gap:3px;}
.result-item{padding:10px 14px;border-radius:9px;cursor:pointer;border:1px solid transparent;transition:all .15s;}
.result-item:hover{background:var(--surface);border-color:var(--border);}
.result-name{font-size:14px;font-weight:600;}
.result-addr{font-size:12px;color:var(--muted);margin-top:1px;}

/* ── LOADING SCREEN ── */
#loading-screen{display:none;flex:1;align-items:center;justify-content:center;flex-direction:column;gap:1.5rem;padding:3rem;}
.loading-biz{font-family:Georgia,serif;font-size:22px;letter-spacing:-.01em;color:var(--text);text-align:center;}
.spinner-lg{width:40px;height:40px;border:3px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-steps{display:flex;flex-direction:column;gap:.5rem;min-width:260px;}
.loading-step-item{display:flex;align-items:center;gap:.75rem;font-size:14px;color:var(--hint);transition:color .3s;}
.loading-step-item.active{color:var(--text);font-weight:500;}
.loading-step-item.done{color:var(--green);}
.step-dot{width:8px;height:8px;border-radius:50%;background:var(--border2);flex-shrink:0;transition:background .3s;}
.loading-step-item.active .step-dot{background:var(--gold);animation:pulse .9s ease-in-out infinite;}
.loading-step-item.done .step-dot{background:var(--green);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

/* ── DECK UI ── */
#deck-ui{display:none;flex:1;flex-direction:column;min-height:0;}
.deck-header{display:flex;align-items:center;gap:1rem;padding:.8rem 1.5rem;border-bottom:1px solid var(--border);background:var(--white);flex-wrap:wrap;}
.deck-biz{flex:1;min-width:0;}
.deck-biz-name{font-family:Georgia,serif;font-size:19px;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.deck-biz-meta{font-size:13px;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.meta-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:8px;}
.gap-high{background:var(--red-dim);color:var(--red);}
.gap-medium{background:var(--amber-dim);color:var(--amber);}
.gap-low{background:var(--green-dim);color:var(--green);}
.save-indicator{font-size:12px;color:var(--green);font-weight:600;display:none;align-items:center;gap:4px;}
.save-indicator.show{display:flex;}
.deck-actions{display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap;align-items:center;}

.deck-body{display:flex;flex:1;min-height:0;overflow:hidden;}

/* Sidebar */
.slide-sidebar{width:190px;flex-shrink:0;border-right:1px solid var(--border);overflow-y:auto;background:var(--surface);padding:.6rem .5rem;}
.sni{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:9px;cursor:pointer;transition:all .15s;margin-bottom:2px;}
.sni:hover{background:var(--surface2);}
.sni.active{background:var(--gold-dim);}
.sni-num{font-size:11px;font-weight:700;color:var(--muted);width:16px;flex-shrink:0;}
.sni.active .sni-num{color:var(--gold);}
.sni-label{font-size:12px;font-weight:500;color:var(--text);line-height:1.3;}
.sni.active .sni-label{color:var(--gold-dark);font-weight:600;}

/* Stage */
.slide-stage{flex:1;overflow:auto;display:flex;align-items:flex-start;justify-content:center;padding:2rem;background:var(--cream);}
.slide{width:100%;max-width:820px;min-height:440px;border-radius:20px;box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column;justify-content:center;padding:3.5rem 4rem;position:relative;animation:slideIn .28s ease;}
@keyframes slideIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

.deck-footer{display:flex;align-items:center;justify-content:center;gap:1rem;padding:.75rem;border-top:1px solid var(--border);background:var(--white);}
.slide-counter{font-size:13px;color:var(--muted);font-weight:500;min-width:50px;text-align:center;}

/* ── SHARED SLIDE ELEMENTS ── */
.s-eyebrow{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-bottom:1rem;}
.s-title{font-family:Georgia,serif;font-size:1.5rem;letter-spacing:-.01em;margin-bottom:1.5rem;}
.s-main{font-family:Georgia,serif;font-size:2.4rem;line-height:1.15;letter-spacing:-.02em;margin-bottom:.75rem;}
.s-main-sm{font-family:Georgia,serif;font-size:1.75rem;line-height:1.25;letter-spacing:-.02em;margin-bottom:.75rem;}
.s-support{font-size:1rem;color:var(--muted);line-height:1.55;}

/* ── SLIDE 0: COMPARISON ── */
.slide-comparison{background:var(--white);}
.comp-table{width:100%;border-collapse:collapse;margin-top:.5rem;}
.comp-table th{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);padding:.55rem .75rem;border-bottom:2px solid var(--border2);text-align:left;}
.comp-table td{padding:.7rem .75rem;border-bottom:1px solid var(--border);font-size:14px;vertical-align:middle;}
.comp-table tr.you-row td{background:var(--gold-dim);font-weight:600;}
.comp-table tr.you-row td:first-child{border-left:4px solid var(--gold);}
.bar-wrap{display:flex;align-items:center;gap:8px;}
.bar{height:6px;border-radius:3px;min-width:4px;flex-shrink:0;}

/* ── SLIDE 1: GAP ── */
.slide-gap{background:#1a1a1a;color:#f5f2ec;}
.slide-gap .s-eyebrow{color:var(--gold);}
.slide-gap .s-main{font-size:4.5rem;color:var(--gold);}
.slide-gap .s-support{color:rgba(245,242,236,.6);}

/* ── SLIDE 2: IMPACT ── */
.slide-impact{background:var(--cream);}
.slide-impact .s-main-sm{color:var(--text);}
.slide-impact .s-quote{font-family:Georgia,serif;font-style:italic;font-size:1.5rem;line-height:1.5;color:var(--text);border-left:5px solid var(--gold);padding:.6rem 1.25rem;margin-bottom:.75rem;}

/* ── SLIDE 3: COST ── */
.slide-cost{background:var(--white);}
.slide-cost .s-main{color:var(--red);}

/* ── SLIDE 4: OPPORTUNITY ── */
.slide-opportunity{background:var(--cream);}
.slide-opportunity .s-main{color:var(--green);}

/* ── SLIDE 5: CTA ── */
.slide-cta{background:#1a1a1a;color:#f5f2ec;align-items:center;text-align:center;}
.slide-cta .s-eyebrow{color:var(--gold);}
.slide-cta .s-main{color:#f5f2ec;font-size:2.6rem;}
.slide-cta .s-support{color:rgba(245,242,236,.6);margin-bottom:2rem;}
.btn-cta{background:var(--gold);color:#1a1a1a;border:none;padding:1rem 2.5rem;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
.btn-cta:hover{background:var(--gold-dark);transform:translateY(-1px);}

/* ── SLIDE 6: HOW IT WORKS ── */
.slide-how{background:var(--white);}
.how-steps{display:flex;gap:0;align-items:flex-start;margin-top:.5rem;}
.how-step{flex:1;text-align:center;padding:0 .5rem;}
.how-num{width:40px;height:40px;border-radius:50%;background:var(--gold);color:#1a1a1a;font-size:17px;font-weight:700;display:flex;align-items:center;justify-content:center;margin:0 auto .9rem;}
.how-label{font-size:.95rem;font-weight:600;color:var(--text);margin-bottom:.3rem;}
.how-sub{font-size:.82rem;color:var(--muted);line-height:1.4;}
.how-arrow{padding-top:18px;color:var(--border2);font-size:1.4rem;flex-shrink:0;}

/* ── PRESENTATION MODE ── */
#pres-overlay{display:none;position:fixed;inset:0;z-index:100;background:#0d0d0d;flex-direction:column;}
#pres-overlay.open{display:flex;}
#pres-slide-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem;}
#pres-slide-wrap .slide{max-width:920px;width:100%;}
#pres-nav{display:flex;align-items:center;justify-content:center;gap:1.5rem;padding:.9rem;border-top:1px solid rgba(255,255,255,.08);}
#pres-nav .slide-counter{color:rgba(255,255,255,.4);}
#pres-exit{position:fixed;top:1rem;right:1.5rem;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.7);padding:6px 14px;border-radius:8px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;}
#pres-exit:hover{background:rgba(255,255,255,.15);}

/* ── PROSPECTS ── */
.prospects-wrap{max-width:960px;margin:0 auto;padding:2.5rem 1.5rem 5rem;width:100%;}
.prospects-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.75rem;flex-wrap:wrap;gap:1rem;}
.prospects-title{font-family:Georgia,serif;font-size:26px;letter-spacing:-.02em;}
.filter-tabs{display:flex;gap:4px;}
.filter-tab{font-size:12px;padding:5px 12px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;}
.filter-tab.active{background:var(--gold-dim);border-color:var(--gold);color:var(--gold-dark);font-weight:600;}

.pipeline{display:flex;gap:8px;overflow-x:auto;padding-bottom:.5rem;margin-bottom:2rem;}
.pipe-col{min-width:175px;flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:.75rem;}
.pipe-col-hdr{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-bottom:.6rem;display:flex;align-items:center;justify-content:space-between;}
.pipe-count{font-size:11px;background:var(--surface2);padding:1px 7px;border-radius:8px;color:var(--text);font-weight:700;}
.pipe-card{background:var(--white);border:1px solid var(--border);border-radius:9px;padding:.8rem;margin-bottom:5px;cursor:pointer;transition:all .15s;}
.pipe-card:hover{border-color:var(--gold);box-shadow:var(--shadow-sm);}
.pipe-card-name{font-size:13px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pipe-card-meta{font-size:11px;color:var(--muted);}
.gap-pill{display:inline-block;font-size:10px;font-weight:700;padding:1px 7px;border-radius:6px;margin-top:4px;}

.prospect-list{display:flex;flex-direction:column;gap:6px;}
.p-row{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:border-color .15s;}
.p-row:hover{border-color:var(--border2);}
.p-main{display:flex;align-items:center;gap:1rem;padding:1rem 1.25rem;flex-wrap:wrap;}
.p-name{font-size:14px;font-weight:600;flex:1;min-width:120px;}
.p-meta{font-size:12px;color:var(--muted);}
.p-actions{display:flex;gap:5px;flex-shrink:0;}
.p-edit-panel{display:none;padding:.75rem 1.25rem 1rem;border-top:1px solid var(--border);background:var(--surface);gap:10px;flex-direction:column;}
.p-edit-panel.open{display:flex;}
.p-edit-row{display:flex;gap:10px;align-items:flex-start;flex-wrap:wrap;}
.p-notes{width:100%;border:1px solid var(--border2);border-radius:8px;padding:9px 12px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);background:var(--white);outline:none;resize:vertical;min-height:70px;}
.p-notes:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-dim);}
.p-status-sel{font-size:13px;border:1px solid var(--border2);border-radius:8px;padding:7px 10px;background:var(--white);color:var(--text);cursor:pointer;font-family:'DM Sans',sans-serif;}

/* ── PRINT ── */
@media print{
  nav,.deck-header,.slide-sidebar,.deck-footer,.deck-actions{display:none!important;}
  .slide-stage{padding:0;}
  .slide{page-break-after:always;border-radius:0;box-shadow:none;max-width:100%;}
}
</style>
</head>
<body>

<nav>
  <div class="logo">Grow<span>Stars</span></div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchTab('audit')">Audit</button>
    <button class="nav-tab" onclick="switchTab('prospects')">Prospects</button>
  </div>
</nav>

<!-- ── AUDIT PAGE ── -->
<div class="page active" id="page-audit">

  <!-- Search -->
  <div class="search-wrap" id="search-section">
    <h1 class="search-title">Business Audit</h1>
    <p class="search-sub">Search a business to generate competitor analysis and outreach materials.</p>
    <div class="search-card">
      <div class="input-row">
        <input id="searchInput" class="search-input" type="text" placeholder="e.g. Joe's Hair Studio, Dublin" autocomplete="off"/>
        <button class="btn btn-primary" onclick="doSearch()">Search</button>
      </div>
      <div id="searchResults" class="search-results"></div>
    </div>
    <div id="status-line" style="text-align:center;font-size:13px;color:var(--muted);padding:.75rem;min-height:40px;display:flex;align-items:center;justify-content:center;gap:8px;"></div>
  </div>

  <!-- Loading screen -->
  <div id="loading-screen">
    <div class="loading-biz" id="loading-biz-name"></div>
    <div class="spinner-lg"></div>
    <div class="loading-steps" id="loading-steps">
      <div class="loading-step-item" id="step-0"><div class="step-dot"></div>Fetching profile data…</div>
      <div class="loading-step-item" id="step-1"><div class="step-dot"></div>Finding competitors nearby…</div>
      <div class="loading-step-item" id="step-2"><div class="step-dot"></div>Calculating gaps…</div>
      <div class="loading-step-item" id="step-3"><div class="step-dot"></div>Generating insights…</div>
    </div>
  </div>

  <!-- Deck UI -->
  <div id="deck-ui">
    <div class="deck-header">
      <div class="deck-biz">
        <div class="deck-biz-name" id="deck-biz-name"></div>
        <div class="deck-biz-meta" id="deck-biz-meta"></div>
      </div>
      <div class="deck-actions">
        <div class="save-indicator" id="saveIndicator">✓ Saved</div>
        <button class="btn btn-sm" id="copyWaBtn" onclick="copyWhatsApp()">📋 WhatsApp</button>
        <button class="btn btn-sm" id="copyLoomBtn" onclick="copyLoom()">📋 Loom Script</button>
        <button class="btn btn-sm" onclick="exportPDF()">PDF</button>
        <button class="btn btn-sm btn-dark" onclick="enterPresentation()">⛶ Present</button>
        <button class="btn btn-sm btn-ghost" onclick="resetToSearch()">✕</button>
      </div>
    </div>
    <div class="deck-body">
      <aside class="slide-sidebar" id="slideSidebar"></aside>
      <div class="slide-stage" id="slideStage"></div>
    </div>
    <div class="deck-footer">
      <button class="btn btn-icon" onclick="goDeck(-1)">&#8592;</button>
      <span class="slide-counter" id="deckCounter">1 / 7</span>
      <button class="btn btn-icon" onclick="goDeck(1)">&#8594;</button>
    </div>
  </div>
</div>

<!-- ── PROSPECTS PAGE ── -->
<div class="page" id="page-prospects">
  <div class="prospects-wrap">
    <div class="prospects-hdr">
      <h1 class="prospects-title">Prospects</h1>
      <div class="filter-tabs" id="filterTabs">
        <button class="filter-tab active" onclick="filterProspects('all',this)">All</button>
        <button class="filter-tab" onclick="filterProspects('new',this)">New</button>
        <button class="filter-tab" onclick="filterProspects('contacted',this)">Contacted</button>
        <button class="filter-tab" onclick="filterProspects('booked',this)">Booked</button>
      </div>
    </div>
    <div id="prospectsContainer"><div style="color:var(--muted);font-size:14px;padding:2rem 0">Loading…</div></div>
  </div>
</div>

<!-- ── PRESENTATION OVERLAY ── -->
<div id="pres-overlay">
  <button id="pres-exit" onclick="exitPresentation()">✕ Exit</button>
  <div id="pres-slide-wrap"></div>
  <div id="pres-nav">
    <button class="btn btn-icon" style="background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2);color:#fff;" onclick="goPres(-1)">&#8592;</button>
    <span class="slide-counter" id="presCounter">1 / 7</span>
    <button class="btn btn-icon" style="background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2);color:#fff;" onclick="goPres(1)">&#8594;</button>
  </div>
</div>

<script>
// ── CONSTANTS ──────────────────────────────────────────────────────
const API = '/api/audit';
const SLIDE_LABELS = ['You vs Competitors','The Gap','Impact','Cost / Risk','Opportunity','Call to Action','How It Works'];
const STATUSES = ['new','contacted','viewed','booked','lost'];
const STATUS_LABELS = {new:'New',contacted:'Contacted',viewed:'Viewed',booked:'Booked',lost:'Lost'};

// ── STATE ──────────────────────────────────────────────────────────
let analysisData  = null;
let placeData     = null;
let currentSlide  = 0;
let allProspects  = [];
let currentFilter = 'all';
let presSlide     = 0;

// ── TABS ───────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + tab).classList.add('active');
  document.querySelectorAll('.nav-tab')[tab === 'audit' ? 0 : 1].classList.add('active');

// ── SEARCH ─────────────────────────────────────────────────────────
async function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  setStatus('Searching…', true);
  document.getElementById('searchResults').innerHTML = '';
  try {
    const data = await apiFetch(API + '?action=search&query=' + encodeURIComponent(q));
    setStatus('');
    const candidates = data.candidates || [];
    if (!candidates.length) { setStatus('No results found.'); return; }
    const sr = document.getElementById('searchResults');
    candidates.forEach(c => {
      const el = document.createElement('div');
      el.className = 'result-item';
      el.innerHTML = '<div class="result-name">' + _esc(c.name) + '</div>'
        + '<div class="result-addr">' + _esc(c.formatted_address || '') + '</div>';
      el.onclick = () => selectBusiness(c.place_id, c.name, c.formatted_address);
      sr.appendChild(el);
    });
  } catch (e) { setStatus('Search failed: ' + e.message); }
}

async function selectBusiness(placeId, name, address) {
  document.getElementById('searchResults').innerHTML = '';
  showLoading(name);
  try {
    const data = await apiFetch(API + '?action=details&place_id=' + encodeURIComponent(placeId));
    const biz = data.result || {};
    placeData = {
      place_id: placeId,
      name: biz.name || name,
      address: biz.formatted_address || address,
      rating: biz.rating || 0,
      review_count: biz.user_ratings_total || 0,
      website: biz.website || '',
      phone: biz.formatted_phone_number || '',
    };
    runAnalysis();
  } catch (e) { hideLoading(); setStatus('Failed to load details: ' + e.message); }
}

function resetToSearch() {
  document.getElementById('deck-ui').style.display = 'none';
  document.getElementById('search-section').style.display = 'block';
  analysisData = null; placeData = null; currentSlide = 0;
}

// ── LOADING SCREEN ─────────────────────────────────────────────────
const STEP_DELAYS = [0, 1400, 3000, 5200];
let stepTimers = [];

function showLoading(bizName) {
  document.getElementById('search-section').style.display = 'none';
  document.getElementById('loading-biz-name').textContent = bizName;
  document.getElementById('loading-screen').style.display = 'flex';
  // Reset steps
  for (let i = 0; i < 4; i++) {
    const el = document.getElementById('step-' + i);
    el.classList.remove('active', 'done');
  }
  // Animate steps
  stepTimers.forEach(clearTimeout);
  stepTimers = [];
  STEP_DELAYS.forEach((delay, i) => {
    stepTimers.push(setTimeout(() => {
      if (i > 0) document.getElementById('step-' + (i - 1)).classList.replace('active', 'done');
      document.getElementById('step-' + i).classList.add('active');
    }, delay));
  });
}

function hideLoading() {
  stepTimers.forEach(clearTimeout);
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('search-section').style.display = 'block';
}

// ── ANALYSIS ───────────────────────────────────────────────────────
async function runAnalysis() {
  try {
    const data = await apiFetch(API + '?action=analyze&place_id=' + encodeURIComponent(placeData.place_id), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ biz: { website: placeData.website, phone: placeData.phone } }),
    });
    if (data.error) throw new Error(data.error);
    // Mark last step done
    document.getElementById('step-3').classList.replace('active', 'done');
    await sleep(300);
    analysisData = { ...data, ...placeData };
    document.getElementById('loading-screen').style.display = 'none';
    showDeck();
    autoSave();
  } catch (e) {
    hideLoading();
    setStatus('Analysis failed: ' + e.message);
  }
}

function buildSidebar() {
  const sb = document.getElementById('slideSidebar');
  sb.innerHTML = SLIDE_LABELS.map((label, i) =>
    '<div class="sni' + (i === 0 ? ' active' : '') + '" id="sni-' + i + '" onclick="jumpSlide(' + i + ')">'

}

function jumpSlide(i) { currentSlide = i; renderSlide(i); }

function goDeck(dir) {
  const n = Math.max(0, Math.min(SLIDE_LABELS.length - 1, currentSlide + dir));
  if (n !== currentSlide) { currentSlide = n; renderSlide(n); }
}

function renderSlide(idx) {
  document.querySelectorAll('.sni').forEach((el, i) => el.classList.toggle('active', i === idx));

}

// ── SLIDE BUILDER ──────────────────────────────────────────────────
function buildSlideHTML(idx, d) {
  const slides = d.slides || [];
  const s = slides[idx] || {};
  switch (idx) {
    case 0: return slideComparison(s, d);
    case 1: return slideGap(s, d);
    case 2: return slideImpact(s);
    case 3: return slideCost(s, d);
    case 4: return slideOpportunity(s, d);
    case 5: return slideCTA(s);
    case 6: return slideHow(s, d);
    default: return slideGeneric(s);
  }
}

function slideComparison(s, d) {
  const bizReviews = d.biz_reviews || d.review_count || 0;
  const bizRating  = d.biz_rating  || d.rating || 0;
  const comps = d.competitors || [];
  const maxR = Math.max(bizReviews, ...comps.map(c => c.review_count), 1);
  let rows = '<tr class="you-row">'
    + '<td><strong>' + _esc(d.name) + '</strong> <span style="font-size:10px;color:var(--gold-dark);font-weight:700;background:var(--gold-dim);padding:1px 6px;border-radius:5px;">YOU</span></td>'
    + '<td>' + starStr(bizRating) + ' ' + bizRating + '</td>'
    + '<td><div class="bar-wrap"><div class="bar" style="width:' + barW(bizReviews, maxR) + 'px;background:var(--gold)"></div><span>' + bizReviews + '</span></div></td></tr>';
  comps.forEach(c => {
    rows += '<tr><td>' + _esc(c.name) + '</td>'
      + '<td>' + starStr(c.rating) + ' ' + c.rating + '</td>'
      + '<td><div class="bar-wrap"><div class="bar" style="width:' + barW(c.review_count, maxR) + 'px;background:var(--border2)"></div><span>' + c.review_count + '</span></div></td></tr>';
  });
  return '<div class="slide slide-comparison">'
    + '<div class="s-eyebrow">Audit Finding</div>'
    + '<div class="s-title">' + _esc(s.title || 'You vs Competitors') + '</div>'
    + (s.main ? '<div class="s-main-sm">' + _esc(s.main) + '</div>' : '')
    + '<table class="comp-table"><thead><tr><th>Business</th><th>Rating</th><th>Reviews</th></tr></thead><tbody>' + rows + '</tbody></table>'
    + (s.supporting ? '<div class="s-support" style="margin-top:1rem">' + _esc(s.supporting) + '</div>' : '')
    + '</div>';
}

function slideGap(s, d) {
  const ratio = d.dominance_ratio || 1;
  const disp  = ratio >= 10 ? Math.round(ratio) + 'x' : ratio.toFixed(1) + 'x';
  return '<div class="slide slide-gap">'
    + '<div class="s-eyebrow">The Gap</div>'
    + '<div class="s-main">' + _esc(s.main || disp) + '</div>'
    + '<div class="s-title" style="color:#f5f2ec;font-size:1.4rem;margin-bottom:.75rem">' + _esc(s.title || 'Behind top competitors') + '</div>'
    + (s.supporting ? '<div class="s-support">' + _esc(s.supporting) + '</div>' : '')
    + '</div>';
}

function slideImpact(s) {
  return '<div class="slide slide-impact">'
    + '<div class="s-eyebrow">Impact</div>'
    + '<div class="s-quote">' + _esc(s.main || s.title || '') + '</div>'
    + (s.supporting ? '<div class="s-support">' + _esc(s.supporting) + '</div>' : '')
    + '</div>';
}

function slideCost(s, d) {
  const rev = d.revenue_range || '€30–€80';
  return '<div class="slide slide-cost">'
    + '<div class="s-eyebrow">Cost / Risk</div>'
    + '<div class="s-main">' + _esc(s.main || rev + ' per missed customer') + '</div>'
    + '<div class="s-title" style="font-size:1.3rem;margin-bottom:.75rem">' + _esc(s.title || 'What this is costing you') + '</div>'
    + (s.supporting ? '<div class="s-support">' + _esc(s.supporting) + '</div>' : '')
    + '</div>';
}

function slideOpportunity(s, d) {
  const rev = d.revenue_range || '€30–€80';
  return '<div class="slide slide-opportunity">'
    + '<div class="s-eyebrow">Opportunity</div>'
    + '<div class="s-main">' + _esc(s.main || rev + ' per new customer') + '</div>'
    + '<div class="s-title" style="font-size:1.3rem;margin-bottom:.75rem">' + _esc(s.title || 'What happens if this is fixed') + '</div>'
    + (s.supporting ? '<div class="s-support">' + _esc(s.supporting) + '</div>' : '')
    + '</div>';
}

function slideCTA(s) {
  return '<div class="slide slide-cta">'
    + '<div class="s-eyebrow">Next Step</div>'
    + '<div class="s-main">' + _esc(s.title || 'Ready to fix this?') + '</div>'
    + '<div class="s-support">' + _esc(s.main || s.supporting || 'Book a free 20-minute call.') + '</div>'
    + '<button class="btn-cta" onclick="window.open(\'https://growstars.com/book\',\'_blank\')">Book a Free Call</button>'
    + '</div>';
}

function slideHow(s, d) {
  const slides7 = (d.slides || [])[6] || {};
  const parts = (slides7.main || '').split(/→|->|\n/).map(p => p.trim()).filter(Boolean);
  const steps = [
    { label: parts[0] || 'More Reviews',     sub: 'Customer gets a simple review prompt' },
    { label: parts[1] || 'More Visibility',  sub: 'Google ranks you higher in local search' },
    { label: parts[2] || 'More Customers',   sub: 'Revenue grows automatically' },
  ];
  return '<div class="slide slide-how">'
    + '<div class="s-eyebrow">How It Works</div>'
    + '<div class="s-title">' + _esc(s.title || 'Simple system, real results') + '</div>'
    + '<div class="how-steps">'
    + steps.map((st, i) =>
        (i > 0 ? '<div class="how-arrow">&rarr;</div>' : '')
        + '<div class="how-step"><div class="how-num">' + (i + 1) + '</div>'
        + '<div class="how-label">' + _esc(st.label) + '</div>'
        + '<div class="how-sub">' + _esc(st.sub) + '</div></div>'
      ).join('')
    + '</div>'
    + (s.supporting ? '<div class="s-support" style="margin-top:1.5rem">' + _esc(s.supporting) + '</div>' : '')
    + '</div>';
}

function slideGeneric(s) {
  return '<div class="slide" style="background:var(--white)">'
    + '<div class="s-title">' + _esc(s.title || '') + '</div>'
    + '<div class="s-main-sm">' + _esc(s.main || '') + '</div>'
    + (s.supporting ? '<div class="s-support">' + _esc(s.supporting) + '</div>' : '')
    + '</div>';
}

// ── AUTO-SAVE ──────────────────────────────────────────────────────
async function autoSave() {
  if (!analysisData) return;
  const d = analysisData;
  const reportJson = JSON.stringify({
    slides:           d.slides,
    competitors:      d.competitors,
    loom_script:      d.loom_script,
    insight_summary:  d.insight_summary,
    whatsapp_message: d.whatsapp_message,
    dominance_ratio:  d.dominance_ratio,
    gap_level:        d.gap_level,
    map_pack_score:   d.map_pack_score,
    revenue_range:    d.revenue_range,
    avg_competitor_reviews: d.avg_competitor_reviews,
    biz_reviews:      d.biz_reviews,
    biz_rating:       d.biz_rating,
    category:         d.category,
    name:             d.name,
    address:          d.address,
    rating:           d.rating,
    review_count:     d.review_count,
    website:          d.website,
    phone:            d.phone,
  });
  const payload = {
    business_name:    d.name,
    address:          d.address,
    place_id:         d.place_id,
    rating:           d.biz_rating || d.rating,
    review_count:     d.biz_reviews || d.review_count,
    website:          d.website,
    phone:            d.phone,
    score:            d.map_pack_score,
    gap_level:        d.gap_level,
    dominance_ratio:  d.dominance_ratio,
    category:         d.category,
    insight_summary:  d.insight_summary,
    whatsapp_message: d.whatsapp_message,
    report_json:      reportJson,
    status:           'new',
  };
  try {
    const result = await apiFetch(API + '?action=save', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (result.error) {
      // Retry without report_json in case column doesn't exist
      delete payload.report_json;
      await apiFetch(API + '?action=save', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
    }
    const ind = document.getElementById('saveIndicator');
    ind.classList.add('show');
    setTimeout(() => ind.classList.remove('show'), 3000);
  } catch (_) { /* silent fail on auto-save */ }
}

// ── PDF EXPORT ─────────────────────────────────────────────────────
async function exportPDF() {
  if (!analysisData) return;
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
  const W = 297, H = 210, ml = 20, mr = 20;
  const slides = analysisData.slides || [];
  const d = analysisData;
  const DARK = [26, 26, 26]; const LIGHT = [245, 242, 236]; const GOLD = [200, 169, 110];
  const CREAM = [255, 253, 248]; const WHITE = [255, 255, 255];

  slides.forEach((s, i) => {
    if (i > 0) doc.addPage();
    const isDark = (i === 1 || i === 5);
    doc.setFillColor(...(isDark ? DARK : i % 2 === 0 ? WHITE : CREAM));
    doc.rect(0, 0, W, H, 'F');
    if (isDark) {
      doc.setFillColor(...GOLD);
      doc.rect(0, 0, 5, H, 'F');
    }
    // Slide number
    doc.setFont('helvetica','normal'); doc.setFontSize(8);
    doc.setTextColor(...(isDark ? [80,70,50] : [160,150,130]));
    doc.text((i+1)+' / '+slides.length, W-mr, H-8, {align:'right'});
    // Eyebrow
    doc.setFont('helvetica','bold'); doc.setFontSize(8);
    doc.setTextColor(...GOLD);
    doc.text((SLIDE_LABELS[i]||'').toUpperCase(), ml, 28);
    // Title
    doc.setFont('times','bold'); doc.setFontSize(20);
    doc.setTextColor(...(isDark ? LIGHT : DARK));
    doc.text(s.title||'', ml, 44);
    // Main
    doc.setFont('times','bold'); doc.setFontSize(28);
    doc.setTextColor(...(isDark ? GOLD : DARK));
    const mainLines = doc.splitTextToSize(s.main||'', W - ml - mr);
    doc.text(mainLines, ml, 65);
    // Supporting
    if (s.supporting) {
      doc.setFont('helvetica','normal'); doc.setFontSize(12);
      doc.setTextColor(...(isDark ? [160,150,130] : [107,101,96]));
      doc.text(doc.splitTextToSize(s.supporting, W-ml-mr), ml, 65 + mainLines.length*12 + 6);
    }
    // Footer
    doc.setFont('helvetica','normal'); doc.setFontSize(8);
    doc.setTextColor(...(isDark ? [80,70,50] : [160,150,130]));
    doc.text('GrowStars.com', ml, H-8);
  });

  const safe = (d.name||'audit').replace(/[^a-z0-9]/gi,'_').toLowerCase();
  doc.save('growstars_' + safe + '.pdf');
}

// ── PROSPECTS ──────────────────────────────────────────────────────
async function loadProspects() {
  try {
    const data = await apiFetch(API + '?action=prospects');
    allProspects = Array.isArray(data) ? data : [];
    renderProspects(allProspects);
  } catch (e) {
    document.getElementById('prospectsContainer').innerHTML =
      '<div style="color:var(--muted);font-size:14px">Failed to load: ' + _esc(e.message) + '</div>';

}

function filterProspects(status, btn) {
  currentFilter = status;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  const filtered = status === 'all' ? allProspects : allProspects.filter(p => p.status === status);
  renderProspects(filtered);
}

function renderProspects(prospects) {
  const container = document.getElementById('prospectsContainer');
  if (!prospects.length) {
    container.innerHTML = '<div style="color:var(--muted);font-size:14px;padding:2rem 0">'
      + (currentFilter === 'all' ? 'No prospects yet. Run an audit — it saves automatically.' : 'No prospects with this status.')
      + '</div>';
    return;
  }

  // Pipeline
  const cols = {}; STATUSES.forEach(s => { cols[s] = []; });
  allProspects.forEach(p => { (cols[p.status || 'new'] || cols.new).push(p); });
  let html = '<div class="pipeline">';
  STATUSES.forEach(st => {
    html += '<div class="pipe-col"><div class="pipe-col-hdr">' + STATUS_LABELS[st]
      + '<span class="pipe-count">' + cols[st].length + '</span></div>';
    cols[st].forEach(p => {
      const gc = p.gap_level === 'high' ? 'gap-high' : p.gap_level === 'medium' ? 'gap-medium' : 'gap-low';
      html += '<div class="pipe-card" onclick="jumpToProspect(\'' + p.id + '\')">'
        + '<div class="pipe-card-name">' + _esc(p.business_name) + '</div>'
        + '<div class="pipe-card-meta">' + _esc((p.rating||'?') + '★ · ' + (p.review_count||0) + ' reviews') + '</div>'
        + (p.gap_level ? '<span class="gap-pill ' + gc + '">' + p.gap_level + ' gap</span>' : '')
        + '</div>';
    });
    html += '</div>';
  });
  html += '</div>';

  // List
  html += '<div class="prospect-list">';
  prospects.forEach(p => {
    const hasReport = !!p.report_json;
    const gc = p.gap_level === 'high' ? 'gap-high' : p.gap_level === 'medium' ? 'gap-medium' : 'gap-low';
    const dateStr = p.created_at ? new Date(p.created_at).toLocaleDateString('en-IE', {day:'numeric',month:'short',year:'numeric'}) : '';
    html += '<div class="p-row" id="prow-' + p.id + '">'
      + '<div class="p-main">'
      + '<div class="p-name">' + _esc(p.business_name) + '</div>'
      + '<div class="p-meta">' + _esc((p.rating||'?') + '★ · ' + (p.review_count||0) + ' reviews · ' + (p.category||'')) + '</div>'
      + (p.gap_level ? '<span class="gap-pill ' + gc + ' p-meta">' + p.gap_level + ' gap</span>' : '')
      + '<div class="p-meta">' + (p.score != null ? 'Score: ' + p.score + '/100' : '') + (dateStr ? ' · ' + dateStr : '') + '</div>'
      + '<div class="p-actions">'
      + (hasReport ? '<button class="btn btn-xs btn-dark" onclick="viewSavedSlides(\'' + p.id + '\')">View Slides</button>' : '')
      + '<button class="btn btn-xs" onclick="copyProspectWa(\'' + p.id + '\')">📋 WA</button>'
      + '<button class="btn btn-xs" onclick="toggleEdit(\'' + p.id + '\')">Edit</button>'
      + '<button class="btn btn-xs btn-red" onclick="deleteProspect(\'' + p.id + '\')">Delete</button>'
      + '</div></div>'
      + '<div class="p-edit-panel" id="edit-' + p.id + '">'
      + '<div class="p-edit-row">'
      + '<select class="p-status-sel" id="sel-' + p.id + '">'
      + STATUSES.map(s => '<option value="' + s + '"' + (p.status === s ? ' selected' : '') + '>' + STATUS_LABELS[s] + '</option>').join('')
      + '</select>'
      + '<div style="flex:1"><textarea class="p-notes" id="notes-' + p.id + '" placeholder="Notes…">' + _esc(p.notes || '') + '</textarea></div>'
      + '</div>'
      + '<div style="display:flex;gap:8px">'
      + '<button class="btn btn-sm btn-green" onclick="saveEdit(\'' + p.id + '\')">Save</button>'
      + '<button class="btn btn-sm btn-ghost" onclick="toggleEdit(\'' + p.id + '\')">Cancel</button>'
      + '</div></div>'
      + '</div>';
  });
  html += '</div>';
  container.innerHTML = html;
}

  const el = document.getElementById('prow-' + id);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function toggleEdit(id) {
  const panel = document.getElementById('edit-' + id);

async function saveEdit(id) {
  const status = document.getElementById('sel-' + id).value;
  const notes  = document.getElementById('notes-' + id).value;
  try {
    await apiFetch(API + '?action=update&id=' + encodeURIComponent(id), {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status, notes }),
    });
    const p = allProspects.find(x => x.id == id);
    if (p) { p.status = status; p.notes = notes; }
    toggleEdit(id);
    loadProspects();
  } catch (e) { alert('Save failed: ' + e.message); }
}

async function deleteProspect(id) {
  const p = allProspects.find(x => x.id == id);
  if (!confirm('Delete ' + (p ? p.business_name : 'this prospect') + '?')) return;
  try {
    await apiFetch(API + '?action=delete&id=' + encodeURIComponent(id));
    loadProspects();
  } catch (e) { alert('Delete failed: ' + e.message); }
}

function copyProspectWa(id) {
  const p = allProspects.find(x => x.id == id);
  if (!p) return;
  const msg = p.whatsapp_message || (p.report_json ? tryParseJson(p.report_json)?.whatsapp_message : '');
  if (msg) navigator.clipboard.writeText(msg).then(() => alert('Copied!'));
  else alert('No WhatsApp message saved for this prospect.');
}

function viewSavedSlides(id) {
  const p = allProspects.find(x => x.id == id);
  if (!p || !p.report_json) return;
  const report = tryParseJson(p.report_json);
  if (!report) { alert('Report data could not be loaded.'); return; }
  // Restore analysisData from stored report
  analysisData = {
    ...report,
    place_id:     p.place_id,
    name:         report.name || p.business_name,
    address:      report.address || p.address,
    rating:       report.rating || p.rating,
    review_count: report.review_count || p.review_count,
    website:      report.website || p.website || '',
    phone:        report.phone || p.phone || '',
  };
  switchTab('audit');
  currentSlide = 0;
  showDeck();
}

function tryParseJson(str) {
  try { return JSON.parse(str); } catch { return null; }
}

// ── UTILS ──────────────────────────────────────────────────────────
function _esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function setStatus(msg, loading) {
  const el = document.getElementById('status-line');
  el.innerHTML = (loading ? '<div class="spinner-lg" style="width:14px;height:14px;border-width:2px"></div>' : '') + _esc(msg);
}
function starStr(r) { return '\u2605'.repeat(Math.min(5, Math.max(0, Math.round(r||0)))); }
function barW(val, max) { return max ? Math.round((val/max) * 140) : 0; }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
async function apiFetch(url, opts) {
  const r = await fetch(url, opts);
  const t = await r.text();
  try { return JSON.parse(t); } catch { throw new Error(t); }
}

document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});
</script>
