<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GrowStars — Lead Runner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Yanone+Kaffeesatz:wght@700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── THEME TOKENS ── */
    :root {
      --bg:          #f5f1ea;
      --bg-input:    #ffffff;
      --logo-main:   #1a1208;
      --gold:        #D4A43A;
      --gold-dim:    rgba(212,164,58,0.12);
      --text:        #1a1208;
      --sub:         #7a6e62;
      --ph:          #b0a492;
      --border-i:    #d4c9b0;
      --btn-bg:      #1a1208;
      --btn-color:   #D4A43A;
      --surface:     #ede9e0;
      --border:      rgba(0,0,0,0.08);
      --border2:     rgba(0,0,0,0.15);
      --white:       #ffffff;
      --toggle-track:#d4c9b0;
    }

    body.dark {
      --bg:          #120d08;
      --bg-input:    #2a1e14;
      --logo-main:   #f5ede0;
      --text:        #f5ede0;
      --sub:         #a09080;
      --ph:          #8a7060;
      --border-i:    #3e3228;
      --btn-bg:      #D4A43A;
      --btn-color:   #120d08;
      --surface:     #1c1410;
      --border:      rgba(255,255,255,0.06);
      --border2:     rgba(255,255,255,0.11);
      --white:       #1e1610;
      --toggle-track:#D4A43A;
    }

    html { font-family: 'Inter', Arial, sans-serif; font-size: 16px; line-height: 1.6; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      color: var(--text);
      transition: background 0.4s, color 0.4s;
    }

    /* ── TOPBAR ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      position: relative;
      z-index: 20;
    }

    .nav-link {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--sub);
      text-decoration: none;
      padding: 5px 12px;
      border: 0.5px solid var(--border-i);
      border-radius: 3px;
      transition: color 0.4s, border-color 0.4s;
    }

    .nav-link:hover { color: var(--text); }

    /* ── THEME TOGGLE ── */
    .theme-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .toggle-label {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--sub);
      transition: color 0.4s;
      user-select: none;
    }

    .toggle-track {
      width: 36px;
      height: 18px;
      border-radius: 9px;
      background: var(--toggle-track);
      position: relative;
      transition: background 0.4s;
    }

    .toggle-thumb {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #fff;
      position: absolute;
      top: 3px;
      left: 3px;
      transition: transform 0.4s;
    }

    body.dark .toggle-thumb { transform: translateX(18px); }

    /* ── HERO ── */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 36px 24px 48px;
      min-height: calc(100vh - 56px);
    }

    .hero-rule {
      width: 32px;
      height: 1px;
      background: #D4A43A;
    }

    .hero-rule.top    { margin-bottom: 16px; }
    .hero-rule.bottom { margin-top: 40px; }

    .hero-brand {
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      line-height: 1;
      margin-bottom: 14px;
    }

    .hero-brand .b-main { color: var(--logo-main); transition: color 0.4s; }
    .hero-brand .b-gold { color: #D4A43A; }

    .hero-ornament {
      display: flex;
      gap: 5px;
      align-items: center;
      margin-bottom: 22px;
    }

    .hero-ornament span {
      display: block;
      border-radius: 50%;
      background: #D4A43A;
    }

    .hero-ornament span:nth-child(1),
    .hero-ornament span:nth-child(3) { width: 3px; height: 3px; }
    .hero-ornament span:nth-child(2) { width: 5px; height: 5px; }

    .hero-h1 {
      font-family: 'Yanone Kaffeesatz', sans-serif;
      font-weight: 700;
      font-size: 56px;
      line-height: 1.0;
      margin-bottom: 18px;
      max-width: 820px;
    }

    @media (max-width: 600px) {
      .hero-h1 { font-size: 36px; }
    }

    .hero-h1 .h-dark { color: var(--logo-main); transition: color 0.4s; }
    .hero-h1 .h-gold { color: #D4A43A; }

    .hero-sub {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 13px;
      color: var(--sub);
      max-width: 300px;
      line-height: 1.9;
      letter-spacing: 0.02em;
      margin-bottom: 20px;
      transition: color 0.4s;
    }

    .input-helper {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 300;
      color: var(--sub);
      opacity: 0.7;
      text-align: center;
      margin-top: 10px;
      letter-spacing: 0.02em;
      transition: color 0.4s;
    }

    /* ── INPUT GROUP ── */
    .input-group {
      width: 100%;
      max-width: 440px;
      display: flex;
      align-items: stretch;
      margin-bottom: 16px;
      border-radius: 3px;
      overflow: hidden;
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
    }

    .input-group input {
      flex: 1;
      border: 0.5px solid var(--border-i);
      border-right: none;
      border-radius: 0;
      outline: none;
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      color: var(--text);
      background: var(--bg-input);
      padding: 14px 18px;
      transition: border-color 0.15s, background 0.4s, color 0.4s;
    }

    .input-group input:focus { border-color: #D4A43A; }
    .input-group input::placeholder { color: var(--ph); transition: color 0.4s; }

    .input-group button {
      padding: 14px 22px;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: var(--btn-bg);
      color: var(--btn-color);
      border: none;
      border-radius: 0;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s, background 0.4s, color 0.4s;
      flex-shrink: 0;
    }

    .input-group button:hover { opacity: 0.82; }
    .input-group button:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── CITY HINTS ── */
    .city-hints {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 300;
      color: var(--sub);
      letter-spacing: 0.02em;
      transition: color 0.4s;
    }

    .city-hints .city-pill {
      cursor: pointer;
      color: var(--sub);
      transition: color 0.4s;
    }

    .city-hints .city-pill:hover { color: #D4A43A; }

    /* ── POOL COUNT ── */
    #pool-count {
      max-width: 720px;
      margin: 20px auto 0;
      padding: 0 20px;
      font-size: 12px;
      font-weight: 600;
      color: var(--sub);
      letter-spacing: 0.04em;
      transition: color 0.4s;
    }

    /* ── STATUS ── */
    #status {
      max-width: 960px;
      margin: 6px auto 0;
      padding: 0 20px;
      font-size: 12px;
      color: var(--sub);
      min-height: 20px;
      text-align: left;
      max-width: 720px;
      transition: color 0.4s;
    }

    /* ── LEADS LIST ── */
    #leads {
      max-width: 720px;
      margin: 12px auto 64px;
      padding: 0 20px;
    }

    .lead-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .lead-row:last-child { border-bottom: none; }

    .lead-main {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .lead-line1 {
      display: flex;
      align-items: baseline;
      gap: 8px;
      flex-wrap: wrap;
    }

    .lead-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
    }

    .lead-meta {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }

    .lead-line2 {
      font-size: 11px;
      color: var(--muted);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .lead-line2 a {
      color: var(--muted);
      text-decoration: none;
    }

    .lead-line2 a:hover { color: #D4A43A; }

    .lead-obs {
      font-size: 11px;
      font-weight: 500;
      color: var(--text);
      border-left: 2px solid #D4A43A;
      padding-left: 6px;
      line-height: 1.5;
      white-space: pre-line;
      overflow: hidden;
    }

    .lead-priority {
      font-size: 13px;
      flex-shrink: 0;
      line-height: 1;
      margin-top: 1px;
    }

    .lead-actions {
      display: flex;
      gap: 5px;
      flex-shrink: 0;
    }

    .copy-btn {
      font-size: 11px;
      font-family: inherit;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 4px;
      border: 1px solid var(--border2);
      background: var(--white);
      color: var(--text);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .copy-btn:hover { background: var(--surface); }
    .copy-btn.copied { background: #f0faf4; border-color: #a8d8b8; color: #2a7a4a; }
    .copy-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .gen-btn {
      font-size: 11px;
      font-family: inherit;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 4px;
      border: 1px solid #D4A43A;
      background: transparent;
      color: #D4A43A;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .gen-btn:hover { background: var(--gold-dim); }
    .gen-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .lead-expanded {
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .msg-block {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .msg-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--sub);
    }

    .msg-text {
      font-size: 12px;
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 8px 10px;
      white-space: pre-wrap;
      line-height: 1.55;
    }

    .msg-actions {
      display: flex;
      gap: 5px;
      margin-top: 2px;
    }

    .lead-row.contacted  { opacity: 0.38; }
    .lead-row.wa-sent   { opacity: 0.55; border-left: 2px solid #4caf82; }
    .lead-row.call-made { opacity: 0.55; border-left: 2px solid #b59a6a; }

    .outcome-badge {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: var(--sub);
      text-transform: uppercase;
    }

    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 15px;
      padding: 2px 3px;
      line-height: 1;
      opacity: 0.7;
      transition: opacity 0.15s;
      text-decoration: none;
    }

    .icon-btn:hover { opacity: 1; }
    .icon-btn:disabled { opacity: 0.2; cursor: default; }

    .done-label {
      display: flex;
      align-items: center;
      font-size: 15px;
      cursor: pointer;
      user-select: none;
      opacity: 0.7;
      transition: opacity 0.15s;
    }

    .done-label:hover { opacity: 1; }
    .done-label input { display: none; }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
    }

    .modal-box {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 101;
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 24px;
      width: min(520px, 92vw);
      max-height: 80vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .modal-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.4;
    }

    .modal-close {
      font-size: 16px;
      background: none;
      border: none;
      color: var(--sub);
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
      flex-shrink: 0;
    }

    .modal-close:hover { color: var(--text); }

    .empty-state {
      text-align: center;
      padding: 48px 0;
      color: var(--muted);
      font-size: 14px;
    }
  </style>
</head>
<body>

<div class="topbar">
  <a class="nav-link" href="execution-panel.html" target="_blank">Execution Panel ↗</a>
  <div class="theme-toggle" onclick="toggleTheme()">
    <span class="toggle-label">Light</span>
    <div class="toggle-track"><div class="toggle-thumb"></div></div>
    <span class="toggle-label">Dark</span>
  </div>
</div>

<div class="hero">
  <div class="hero-rule top"></div>
  <div class="hero-brand">
    <span class="b-main">Grow</span><span class="b-gold">Stars</span>
  </div>
  <div class="hero-ornament">
    <span></span><span></span><span></span>
  </div>
  <div class="hero-h1">
    <span class="h-dark">Hair Salon Leads </span><span class="h-gold">— Instantly</span>
  </div>
  <p class="hero-sub">Generate qualified salons with ready-to-send outreach messages.</p>
  <div class="input-group">
    <input type="text" id="city-input" placeholder="e.g. Leeds, Manchester, Birmingham" />
    <button id="generate-btn" onclick="generateLeads()">Run Lead Engine →</button>
  </div>
  <div class="input-helper">Runs multi-source search + filters high-fit salons</div>
  <div class="city-hints">
    Try · <span class="city-pill" onclick="setCity('Leeds')">Leeds</span> · <span class="city-pill" onclick="setCity('Birmingham')">Birmingham</span> · <span class="city-pill" onclick="setCity('Manchester')">Manchester</span> · <span class="city-pill" onclick="setCity('Leeds, Manchester, Birmingham, Liverpool')">All 4</span>
  </div>
  <div class="hero-rule bottom"></div>
</div>

<div id="results">
  <div id="pool-count"></div>
  <div id="status"></div>
  <div id="leads"></div>
  <div id="export-bar" style="max-width:720px;margin:12px auto 48px;padding:0 20px;display:none;">
    <button class="copy-btn" onclick="exportCSV()">Export CSV</button>
  </div>
</div>

<!-- Single modal instance, reused for all leads -->
<div id="lead-modal" style="display:none">
  <div class="modal-overlay" id="modal-overlay"></div>
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
  const cityInput   = document.getElementById('city-input');
  const generateBtn = document.getElementById('generate-btn');
  const statusEl    = document.getElementById('status');
  const leadsEl     = document.getElementById('leads');
  const poolCountEl = document.getElementById('pool-count');

  let allLeads = [];
  const leadMap = new Map();

  cityInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') generateLeads();
  });

  async function generateLeads() {
    const raw = cityInput.value.trim();
    if (!raw) { cityInput.focus(); return; }

    const cities = raw.split(',').map(c => c.trim()).filter(Boolean);
    if (cities.length === 0) { cityInput.focus(); return; }

    generateBtn.disabled = true;
    generateBtn.textContent = 'Running…';
    statusEl.textContent = '';
    document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });

    const seenIds = new Set(allLeads.map(l => l.id));
    const cityResults = [];

    for (let ci = 0; ci < cities.length; ci++) {
      const city = cities[ci];
      generateBtn.textContent = `Running ${ci + 1}/${cities.length}…`;
      statusEl.textContent = `Fetching ${city}…`;

      try {
        const res = await fetch('/api/hitlist', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ city, limit: 500 }),
        });

        const data = await res.json();

        if (!res.ok) {
          cityResults.push(`${city}: error — ${data.error || res.statusText}`);
          continue;
        }

        const hits = (data.hits || []).map(l => ({ ...l, _city: city }));
        const newHits = hits.filter(l => !seenIds.has(l.id));
        newHits.forEach(l => seenIds.add(l.id));
        allLeads.push(...newHits);

        cityResults.push(`${city}: ${newHits.length} new lead${newHits.length !== 1 ? 's' : ''}`);

      } catch (err) {
        cityResults.push(`${city}: failed — ${err.message}`);
      }
    }

    // Render all accumulated leads
    renderAllLeads();

    statusEl.textContent = cityResults.join('  ·  ');
    generateBtn.disabled = false;
    generateBtn.textContent = 'Run Lead Engine →';
  }

  function getPriority(rating, reviews) {
    if (rating <= 4.4 && reviews >= 80) return 'high';
    if (rating <= 4.6 && reviews >= 50 && reviews < 80) return 'medium';
    if (rating > 4.4 && rating <= 4.6 && reviews >= 80 && reviews <= 150) return 'medium';
    return 'low';
  }

  function getScore(lead) {
    const clean    = (lead.phone || '').replace(/\D/g, '');
    const isMobile = clean.startsWith('447') || clean.startsWith('07');
    const priority = getPriority(lead.rating, lead.reviews);
    const pScore   = priority === 'high' ? 30 : priority === 'medium' ? 20 : 10;
    return (isMobile ? 100 : 0) + pScore;
  }

  function getObservation(rating, reviews) {
    if (reviews >= 80 && rating <= 4.4) {
      return `Strong traffic but inconsistent customer experience\nLikely losing repeat visits → review optimization opportunity`;
    } else if (reviews <= 60 && rating >= 4.3) {
      return `Limited social proof vs nearby competitors\nLikely impacting conversion from new customers`;
    } else {
      return `Solid presence but not clearly standing out locally\nOpportunity to position as top choice in area`;
    }
  }

  function renderCard(lead, i) {
    const name  = escHtml(lead.name || '');
    const phone = lead.phone ? `<span>${escHtml(lead.phone)}</span>` : '';
    const city  = lead._city || lead.city ? `<span>${escHtml(lead._city || lead.city)}</span>` : '';

    const clean    = (lead.phone || '').replace(/\D/g, '');
    const isMobile = clean.startsWith('447') || clean.startsWith('07');
    const phoneIcon   = lead.phone ? (isMobile ? '📱' : '☎️') : '☎️';
    const contactType = lead.contact_type === 'whatsapp' ? 'WhatsApp' : lead.contact_type === 'call' ? 'Call' : '';
    const contacted   = lead.status === 'contacted';
    const outcome     = lead.contact_outcome || 'pending';
    const outcomeClass = outcome === 'whatsapp_sent' ? ' wa-sent' : outcome === 'call' ? ' call-made' : '';
    const outcomeBadge = outcome === 'whatsapp_sent' ? 'WA Sent' : outcome === 'call' ? 'Call' : '';

    return `
      <div class="lead-row${contacted ? ' contacted' : ''}${outcomeClass}" id="row-${i}">
        <div class="lead-priority">${phoneIcon}</div>
        <div class="lead-main">
          <div class="lead-line1">
            <span class="lead-name">${name}</span>
            <span class="lead-meta">${lead.rating} ⭐ · ${lead.reviews} reviews</span>
          </div>
          <div class="lead-line2">
            ${phone}${city}${contactType ? `<span>${contactType}</span>` : ''}
            <span class="outcome-badge" id="outcome-${i}">${outcomeBadge}</span>
          </div>
        </div>
        <div class="lead-actions">
          ${lead.website ? `<button class="icon-btn site-btn" data-index="${i}">🌐</button>` : ''}
          ${clean ? `<button class="icon-btn wa-icon-btn" data-index="${i}">💬</button>` : ''}
          ${clean ? `<a class="icon-btn call-icon-btn" href="tel:${clean}" data-index="${i}">📞</a>` : ''}
          <button class="icon-btn" disabled>🎥</button>
          <label class="done-label" title="Mark as done"><input type="checkbox" class="done-cb" data-index="${i}"${contacted ? ' checked' : ''}>${contacted ? '☑️' : '⬜'}</label>
        </div>
      </div>`;
  }

  function openModal(i) {
    const lead = leadMap.get(i);
    if (!lead) return;

    const obs     = getObservation(lead.rating, lead.reviews);
    const waMsg   = lead.whatsapp_message || '';
    const loomMsg = lead.loom_hook || '';
    const cleanNum = (lead.phone || '').replace(/\D/g, '');

    document.getElementById('modal-title').textContent = lead.name || '';

    const body = document.getElementById('modal-body');
    body.innerHTML = `
      <div class="lead-obs" style="margin-bottom:12px">${escHtml(obs)}</div>
      <div class="msg-block">
        <div class="msg-label">WhatsApp Message</div>
        <div class="msg-text">${escHtml(waMsg)}</div>
        <div class="msg-actions" style="margin-top:6px">
          ${cleanNum ? `<button class="copy-btn wa-open-btn" data-phone="${cleanNum}" data-message="${escHtml(waMsg)}">Open WA ↗</button>` : ''}
          <button class="copy-btn modal-copy-btn" data-text="${escHtml(waMsg)}">Copy</button>
        </div>
      </div>
      ${loomMsg ? `
      <div class="msg-block">
        <div class="msg-label">Loom Hook</div>
        <div class="msg-text">${escHtml(loomMsg)}</div>
        <div class="msg-actions" style="margin-top:6px">
          <button class="copy-btn modal-copy-btn" data-text="${escHtml(loomMsg)}">Copy</button>
        </div>
      </div>` : ''}`;

    body.querySelectorAll('.wa-open-btn').forEach(b => {
      b.addEventListener('click', () => {
        const url = `https://api.whatsapp.com/send?phone=${b.dataset.phone}&text=${encodeURIComponent(b.dataset.message)}`;
        window.open(url, '_blank');
      });
    });
    body.querySelectorAll('.modal-copy-btn').forEach(b => {
      b.addEventListener('click', () => copyText(b, b.dataset.text));
    });

    document.getElementById('lead-modal').style.display = 'block';
  }

  function closeModal() {
    document.getElementById('lead-modal').style.display = 'none';
  }

  function setOutcome(i, outcome) {
    const lead = leadMap.get(i);
    if (!lead) return;
    lead.contact_outcome = outcome;
    const row = document.getElementById(`row-${i}`);
    row.classList.remove('wa-sent', 'call-made');
    if (outcome === 'whatsapp_sent') row.classList.add('wa-sent');
    if (outcome === 'call')          row.classList.add('call-made');
    const badge = document.getElementById(`outcome-${i}`);
    if (badge) badge.textContent = outcome === 'whatsapp_sent' ? 'WA Sent' : outcome === 'call' ? 'Call' : '';
    saveLeads();
  }

  function attachLeadListeners() {
    leadsEl.querySelectorAll('.wa-icon-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const i    = Number(btn.dataset.index);
        const lead = leadMap.get(i);
        if (!lead) return;
        const clean = (lead.phone || '').replace(/\D/g, '');
        const msg   = lead.whatsapp_message || '';
        window.open(`https://api.whatsapp.com/send?phone=${clean}&text=${encodeURIComponent(msg)}`, '_blank');
        setOutcome(i, 'whatsapp_sent');
      });
    });

    leadsEl.querySelectorAll('.call-icon-btn').forEach(a => {
      a.addEventListener('click', () => {
        setOutcome(Number(a.dataset.index), 'call');
      });
    });

    leadsEl.querySelectorAll('.site-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const lead = leadMap.get(Number(btn.dataset.index));
        if (lead?.website) window.open(lead.website, '_blank');
      });
    });

    leadsEl.querySelectorAll('.done-cb').forEach(cb => {
      cb.addEventListener('change', () => {
        const i    = Number(cb.dataset.index);
        const lead = leadMap.get(i);
        if (!lead) return;
        lead.status = cb.checked ? 'contacted' : 'new';
        const row   = document.getElementById(`row-${i}`);
        row.classList.toggle('contacted', cb.checked);
        const label = cb.closest('.done-label');
        label.childNodes[1].textContent = cb.checked ? '☑️' : '⬜';
        saveLeads();
      });
    });
  }

  function copyText(btn, text) {
    navigator.clipboard.writeText(text).then(() => {
      const orig = btn.textContent;
      btn.textContent = 'Copied ✔';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = orig;
        btn.classList.remove('copied');
      }, 2000);
    });
  }

  function saveLeads() {
    localStorage.setItem('leads_data', JSON.stringify(allLeads));
  }

  function loadFromLocalStorage() {
    try {
      const saved = localStorage.getItem('leads_data');
      if (!saved) return false;
      const leads = JSON.parse(saved);
      if (!Array.isArray(leads) || leads.length === 0) return false;
      allLeads = leads;
      renderAllLeads();
      return true;
    } catch { return false; }
  }

  function renderAllLeads() {
    if (allLeads.length === 0) {
      leadsEl.innerHTML = '<div class="empty-state">No leads yet. Enter a city and run the engine.</div>';
      poolCountEl.textContent = '';
      document.getElementById('export-bar').style.display = 'none';
      return;
    }
    allLeads.sort((a, b) => getScore(b) - getScore(a));
    leadMap.clear();
    allLeads.forEach((lead, i) => leadMap.set(i, lead));
    leadsEl.innerHTML = allLeads.map((lead, i) => renderCard(lead, i)).join('');
    attachLeadListeners();
    const waCount   = allLeads.filter(l => l.contact_type === 'whatsapp').length;
    const callCount = allLeads.filter(l => l.contact_type === 'call').length;
    poolCountEl.textContent = `Total: ${allLeads.length}  ·  WhatsApp: ${waCount}  ·  Call: ${callCount}`;
    document.getElementById('export-bar').style.display = 'block';
    saveLeads();
  }

  async function loadAllLeads() {
    try {
      const res  = await fetch('/api/leads');
      const data = await res.json();
      if (!res.ok || !data.leads) return;

      const seenIds = new Set(allLeads.map(l => l.id));
      const incoming = data.leads.map(l => ({
        ...l,
        id:           l.place_id,
        _city:        l.city,
        contact_type: l.contact_type || ((() => {
          const c = (l.phone || '').replace(/\D/g, '');
          return c.startsWith('447') || c.startsWith('07') ? 'whatsapp' : 'call';
        })()),
      }));

      const newLeads = incoming.filter(l => !seenIds.has(l.id));
      allLeads.push(...newLeads);

      if (allLeads.length > 0) renderAllLeads();
    } catch (err) {
      console.error('Failed to load leads from Supabase:', err);
    }
  }

  function exportCSV() {
    const headers = ['name', 'rating', 'reviews', 'phone', 'contact_type', 'city', 'website', 'maps_link'];
    const rows = allLeads.map(l =>
      headers.map(h => `"${String(l[h] || '').replace(/"/g, '""')}"`).join(',')
    );
    const csv  = [headers.join(','), ...rows].join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `leads-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  }

  // Modal close handlers
  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('modal-overlay').addEventListener('click', closeModal);
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  // Load from localStorage instantly, then merge from Supabase
  loadFromLocalStorage();
  loadAllLeads();

  function setCity(city) {
    cityInput.value = city;
    cityInput.focus();
  }

  // Theme toggle
  function toggleTheme() {
    const isDark = document.body.classList.toggle('dark');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
  }
  if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>

</body>
</html>
