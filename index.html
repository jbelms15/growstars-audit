<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinkedIn Assist — GrowStars</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #f5f1ea;
      color: #1a1208;
      min-height: 100vh;
    }

    /* ── TOPBAR ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      border-bottom: 1px solid rgba(0,0,0,0.08);
      background: #f5f1ea;
    }

    .topbar-left { display: flex; align-items: center; gap: 16px; }

    .brand {
      font-size: 13px;
      font-weight: 600;
      color: #1a1208;
      text-decoration: none;
    }

    .brand span { color: #D4A43A; }

    .page-title {
      font-size: 12px;
      font-weight: 500;
      color: #7a6e62;
      letter-spacing: 0.04em;
    }

    .nav-link {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #7a6e62;
      text-decoration: none;
      padding: 4px 10px;
      border: 0.5px solid #d4c9b0;
      border-radius: 3px;
    }

    .nav-link:hover { color: #1a1208; }

    /* ── MAIN ── */
    .main {
      max-width: 640px;
      margin: 40px auto;
      padding: 0 24px 80px;
    }

    /* ── INPUTS ── */
    .input-section {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 24px;
    }

    .input-row {
      display: flex;
      gap: 10px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
    }

    .field label {
      font-size: 11px;
      font-weight: 500;
      color: #7a6e62;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .field input {
      padding: 10px 12px;
      font-size: 13px;
      font-family: inherit;
      border: 1px solid #d4c9b0;
      border-radius: 6px;
      background: #fff;
      color: #1a1208;
      outline: none;
      transition: border-color 0.15s;
    }

    .field input:focus { border-color: #D4A43A; }
    .field input::placeholder { color: #b0a492; }

    .analyze-btn {
      padding: 11px 24px;
      font-size: 12px;
      font-family: inherit;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: #1a1208;
      color: #D4A43A;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      align-self: flex-end;
      transition: opacity 0.15s;
      white-space: nowrap;
    }

    .analyze-btn:hover { opacity: 0.82; }
    .analyze-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── STATUS ── */
    #status {
      font-size: 12px;
      color: #7a6e62;
      min-height: 18px;
      margin-bottom: 8px;
    }

    /* ── OUTPUT ── */
    #output { display: none; }

    .section { margin-bottom: 24px; }

    .section-title {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #b0a492;
      margin-bottom: 10px;
    }

    /* Snapshot */
    .snapshot {
      background: #fff;
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 8px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .snapshot-name {
      font-size: 15px;
      font-weight: 600;
      flex: 1;
      min-width: 160px;
    }

    .snapshot-meta {
      display: flex;
      gap: 16px;
      font-size: 13px;
      color: #7a6e62;
    }

    .snapshot-meta strong { color: #1a1208; }

    .obs-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      background: rgba(212,164,58,0.12);
      color: #b59a3a;
      white-space: nowrap;
    }

    /* Message + Script blocks */
    .text-block {
      background: #fff;
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 8px;
      padding: 16px;
    }

    .text-content {
      font-size: 13px;
      color: #1a1208;
      line-height: 1.65;
      white-space: pre-wrap;
    }

    .block-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .copy-btn {
      font-size: 11px;
      font-family: inherit;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 4px;
      border: 1px solid rgba(0,0,0,0.15);
      background: #fff;
      color: #1a1208;
      cursor: pointer;
      transition: all 0.15s;
    }

    .copy-btn:hover { background: #f0ede8; }
    .copy-btn.copied { background: #f0faf4; border-color: #a8d8b8; color: #2a7a4a; }

    .maps-link {
      font-size: 11px;
      color: #b0a492;
      text-decoration: none;
    }

    .maps-link:hover { color: #7a6e62; }

    /* ── COMPETITOR TABLE ── */
    .comp-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .comp-table th {
      text-align: left;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #b0a492;
      padding: 0 8px 8px 0;
      border-bottom: 1px solid rgba(0,0,0,0.08);
    }

    .comp-table td {
      padding: 8px 8px 8px 0;
      border-bottom: 1px solid rgba(0,0,0,0.05);
      color: #1a1208;
      vertical-align: middle;
    }

    .comp-table tr.target-row td {
      background: rgba(212,164,58,0.06);
      font-weight: 600;
    }

    .comp-table tr.target-row td:first-child {
      border-radius: 4px 0 0 4px;
      padding-left: 8px;
    }

    .comp-table tr.target-row td:last-child {
      border-radius: 0 4px 4px 0;
    }

    .delta-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 10px;
      white-space: nowrap;
    }

    .delta-above { background: rgba(40,167,69,0.1); color: #1e7e34; }
    .delta-below { background: rgba(220,53,69,0.1); color: #c82333; }
    .delta-at    { background: rgba(0,0,0,0.06); color: #7a6e62; }

    .you-label {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #D4A43A;
      margin-left: 6px;
    }

    .snapshot-activity {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 4px;
      font-size: 12px;
      color: #7a6e62;
    }

    .velocity-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 10px;
      white-space: nowrap;
    }

    .velocity-fast   { background: rgba(40,167,69,0.1);  color: #1e7e34; }
    .velocity-medium { background: rgba(212,164,58,0.12); color: #b59a3a; }
    .velocity-slow   { background: rgba(220,53,69,0.1);  color: #c82333; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <a class="brand" href="lead-runner.html">Grow<span>Stars</span></a>
    <span class="page-title">LinkedIn Assist</span>
  </div>
  <a class="nav-link" href="lead-runner.html">← Lead Runner</a>
</div>

<div class="main">

  <div class="input-section">
    <div class="input-row">
      <div class="field">
        <label>Business Name</label>
        <input type="text" id="biz-name" placeholder="e.g. Istanbul Barber" />
      </div>
      <div class="field" style="max-width:180px">
        <label>City</label>
        <input type="text" id="biz-city" placeholder="e.g. Leeds" />
      </div>
    </div>
    <div class="input-row">
      <div class="field" style="max-width:200px">
        <label>First Name (prospect)</label>
        <input type="text" id="first-name" placeholder="e.g. Alex" />
      </div>
      <button class="analyze-btn" id="analyze-btn" onclick="analyze()">Analyze →</button>
    </div>
  </div>

  <div id="status"></div>

  <div id="output">

    <div class="section">
      <div class="section-title">Business Snapshot</div>
      <div class="snapshot">
        <div class="snapshot-name" id="snap-name"></div>
        <div class="snapshot-meta">
          <span><strong id="snap-rating"></strong> ⭐</span>
          <span><strong id="snap-reviews"></strong> reviews</span>
        </div>
        <div class="obs-badge" id="snap-obs"></div>
        <a id="snap-link" class="maps-link" href="#" target="_blank">View on Maps ↗</a>
        <div class="snapshot-activity" id="snap-activity" style="display:none">
          <span id="snap-last-review"></span>
          <span class="velocity-badge" id="snap-velocity"></span>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Local Competition</div>
      <div class="text-block">
        <table class="comp-table">
          <thead>
            <tr>
              <th>Business</th>
              <th>Rating</th>
              <th>Reviews</th>
            </tr>
          </thead>
          <tbody id="comp-tbody"></tbody>
        </table>
      </div>
    </div>

    <div class="section">
      <div class="section-title">LinkedIn Message</div>
      <div class="text-block">
        <div class="text-content" id="li-message"></div>
        <div class="block-actions">
          <button class="copy-btn" onclick="copyBlock(this, 'li-message')">Copy</button>
          <button class="copy-btn" id="regen-btn" onclick="regenerate()">Try another angle</button>
          <span id="angle-indicator" style="font-size:10px;color:#b0a492;align-self:center;margin-left:2px"></span>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
  const nameInput    = document.getElementById('biz-name');
  const cityInput    = document.getElementById('biz-city');
  const firstInput   = document.getElementById('first-name');
  const analyzeBtn   = document.getElementById('analyze-btn');
  const statusEl     = document.getElementById('status');
  const outputEl     = document.getElementById('output');

  // Persists last analysis result so regenerate() can re-use it
  let lastCtx = null;
  let currentAngle = 0;
  const TOTAL_ANGLES = 4;

  function formatDaysAgo(days) {
    if (days === null) return null;
    if (days === 0)    return 'today';
    if (days === 1)    return '1 day ago';
    if (days < 7)     return `${days} days ago`;
    if (days < 14)    return '1 week ago';
    if (days < 30)    return `${Math.floor(days / 7)} weeks ago`;
    if (days < 60)    return '1 month ago';
    return `${Math.floor(days / 30)} months ago`;
  }

  [nameInput, cityInput, firstInput].forEach(el => {
    el.addEventListener('keydown', e => { if (e.key === 'Enter') analyze(); });
  });

  function getObservationLabel(rating, reviews) {
    if (reviews >= 200 && rating <= 4.4) return 'high volume, not optimized';
    if (reviews >= 120 && rating < 4.7)  return 'room to improve rating';
    if (rating <= 4.3)                   return 'costing bookings';
    if (reviews <= 80 && rating >= 4.4)  return 'low visibility';
    return 'room to improve';
  }

  // Returns { implicationLine, trustLine } based on obs label + competitor result
  function getMessageParts(obsLabel, hasStrongerCompetitors) {
    const cases = {
      'high volume, not optimized': {
        stronger: {
          implicationLine: 'you\'re getting solid traffic but a few nearby spots look more trusted right now',
          trustLine:       'With that kind of volume, even a small rating improvement could pull a lot more people back in.',
        },
        clear: {
          implicationLine: 'you\'re getting solid traffic but not quite capitalising on it yet',
          trustLine:       'You\'re already ahead locally, so a few small fixes could turn that into a clear advantage.',
        },
      },
      'room to improve rating': {
        stronger: {
          implicationLine: 'a few nearby spots are pulling ahead on trust',
          trustLine:       'People do compare before booking, and that gap is pretty easy to close.',
        },
        clear: {
          implicationLine: 'you\'re ahead of most nearby spots, though there\'s still room to push it higher',
          trustLine:       'Most people compare a few options before committing, and a few tweaks could make the choice obvious.',
        },
      },
      'costing bookings': {
        stronger: {
          implicationLine: 'some nearby spots are building more trust right now',
          trustLine:       'Most people compare a few options before booking, and right now those spots are winning that comparison.',
        },
        clear: {
          implicationLine: 'there\'s definitely room to improve your standing locally',
          trustLine:       'People still compare before booking, and there\'s room here to make that an easy win.',
        },
      },
      'low visibility': {
        stronger: {
          implicationLine: 'a few nearby spots are pulling ahead on both visibility and trust',
          trustLine:       'When someone searches nearby, you might not be the first option they come across.',
        },
        clear: {
          implicationLine: 'you\'re doing well locally, though you could be showing up a lot more',
          trustLine:       'There\'s a good window right now to pull further ahead before someone else does.',
        },
      },
      'room to improve': {
        stronger: {
          implicationLine: 'a few nearby spots are starting to pull ahead',
          trustLine:       'People still compare before booking, and that gap is pretty easy to close.',
        },
        clear: {
          implicationLine: 'you\'re holding your own locally',
          trustLine:       'Most people compare a few options before committing, and there\'s room to make that an easy win.',
        },
      },
    };

    const bucket = cases[obsLabel] || cases['room to improve'];
    return hasStrongerCompetitors ? bucket.stronger : bucket.clear;
  }

  function shortenBizName(name) {
    let s = name.trim();

    // Remove location additions (text after " - ")
    s = s.split(/\s*-\s*/)[0].trim();

    // Remove prefixes at start
    s = s.replace(/^(The|Salon|Barbershop|Hair\s+Salon)\s+/i, '').trim();

    // Remove suffixes iteratively (handles stacked combos like "& Spa Waxing")
    const suffixes = [
      '& Waxing', '& Spa', 'Hair Salon', 'Barbers',
      'Experience', 'Lounge', 'Waxing', 'Spa', 'Studio',
    ];
    let prev;
    do {
      prev = s;
      for (const suffix of suffixes) {
        const escaped = suffix.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const candidate = s.replace(new RegExp(`\\s+${escaped}$`, 'i'), '').trim();
        if (candidate.length > 0) s = candidate;
      }
    } while (s !== prev);

    // Prefer 2 words, allow 3 if needed
    const words = s.split(/\s+/);
    s = words.slice(0, 2).join(' ');

    // Fallback: never return empty
    return s || name.trim();
  }

  function selectDefaultAngle({ lastReviewDays, hasStronger, rating }) {
    if (lastReviewDays !== null && lastReviewDays > 60) return 0; // Velocity
    if (hasStronger)                                              return 1; // Competition
    if (rating >= 4.6)                                            return 2; // Opportunity
    return 3;                                                               // Visibility
  }

  function buildMessage(angle, { firstName, bizName, rating, reviews, lastReviewDays, velocity }) {
    switch (angle) {
      case 1:
        // Competition
        return `Hey ${firstName} — quick one.\n\nNoticed ${bizName} is at ${rating} with ${reviews} reviews — which is solid. A few nearby spots are building up more reviews though.\n\nThat can influence how people decide which salon to go to when they're comparing.\n\nI made a quick breakdown on how to stay ahead — want me to send it?`;
      case 2:
        // Opportunity
        return `Hey ${firstName} — quick one.\n\n${bizName} is sitting at ${rating} with ${reviews} reviews — which is strong.\n\nWith a bit more consistent review flow, you could stand out even more locally.\n\nI made a quick breakdown on how to do that — want me to send it?`;
      case 3:
        // Visibility
        return `Hey ${firstName} — quick one.\n\nNoticed when people search nearby, ${bizName} isn't always showing as prominently as it could.\n\nThat usually comes down to how often new reviews are coming in.\n\nI made a quick breakdown of what affects that — want me to send it?`;
      default:
        // Velocity (angle 0 — default/priority)
        return `Hey ${firstName} — quick one.\n\nNoticed review activity has slowed down a bit for ${bizName} recently.\n\nA few nearby spots are getting reviews more consistently, which can affect how people decide which salon to go to.\n\nI made a quick breakdown on how to get reviews coming in more consistently — want me to send it?`;
    }
  }

  function regenerate() {
    if (!lastCtx) return;
    currentAngle = (currentAngle + 1) % TOTAL_ANGLES;
    document.getElementById('li-message').textContent = buildMessage(currentAngle, lastCtx);
    document.getElementById('angle-indicator').textContent = `${currentAngle + 1} / ${TOTAL_ANGLES}`;
  }

  async function analyze() {
    const name = nameInput.value.trim();
    if (!name) { nameInput.focus(); return; }

    analyzeBtn.disabled = true;
    analyzeBtn.textContent = 'Analyzing…';
    statusEl.textContent = 'Looking up business…';
    outputEl.style.display = 'none';

    try {
      const res  = await fetch('/api/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, city: cityInput.value.trim() }),
      });

      const data = await res.json();

      if (!res.ok) {
        statusEl.textContent = 'Not found. Try adding the city or double-check the spelling.';
        return;
      }

      const { business, competitors } = data;
      const { name: bizName, rating, reviews, maps_link, last_review_days, review_velocity } = business;
      const firstName    = firstInput.value.trim() || '{{first_name}}';
      const shortBizName = shortenBizName(bizName);
      const obsLabel  = getObservationLabel(rating, reviews);

      // Snapshot
      document.getElementById('snap-name').textContent    = bizName;
      document.getElementById('snap-rating').textContent  = rating;
      document.getElementById('snap-reviews').textContent = reviews;
      document.getElementById('snap-obs').textContent     = obsLabel;
      document.getElementById('snap-link').href           = maps_link;

      // Activity row
      const lastReviewLabel = formatDaysAgo(last_review_days);
      if (lastReviewLabel) {
        const velocityLabels = { fast: 'Active', medium: 'Steady', slow: 'Slowing' };
        const velocityClass  = { fast: 'velocity-fast', medium: 'velocity-medium', slow: 'velocity-slow' };
        document.getElementById('snap-last-review').textContent  = `Last review ${lastReviewLabel}`;
        const velEl = document.getElementById('snap-velocity');
        if (velocityLabels[review_velocity]) {
          velEl.textContent  = velocityLabels[review_velocity];
          velEl.className    = `velocity-badge ${velocityClass[review_velocity]}`;
          velEl.style.display = '';
        } else {
          velEl.style.display = 'none';
        }
        document.getElementById('snap-activity').style.display = '';
      } else {
        document.getElementById('snap-activity').style.display = 'none';
      }

      // Competitor analysis
      const validComps = competitors.filter(c => c.reviews >= 30);
      const hasStronger = validComps.some(
        c => c.rating >= rating && c.reviews >= reviews * 0.5
      );
      const { implicationLine, trustLine } = getMessageParts(obsLabel, hasStronger);

      // Competitor table (rating + reviews only, no averages)
      const tbody = document.getElementById('comp-tbody');
      tbody.innerHTML = '';

      tbody.insertAdjacentHTML('beforeend', `
        <tr class="target-row">
          <td>${bizName}<span class="you-label">you</span></td>
          <td>${rating} ⭐</td>
          <td>${reviews}</td>
        </tr>`);

      for (const c of competitors) {
        tbody.insertAdjacentHTML('beforeend', `
          <tr>
            <td>${c.name}</td>
            <td>${c.rating} ⭐</td>
            <td>${c.reviews}</td>
          </tr>`);
      }

      // Save context for regenerate
      lastCtx = { firstName, bizName: shortBizName, rating, reviews, implicationLine, trustLine, lastReviewDays: last_review_days, velocity: review_velocity, hasStronger };
      currentAngle = selectDefaultAngle({ lastReviewDays: last_review_days, hasStronger, rating });
      document.getElementById('angle-indicator').textContent = `${currentAngle + 1} / ${TOTAL_ANGLES}`;
      document.getElementById('li-message').textContent = buildMessage(currentAngle, lastCtx);

      statusEl.textContent = '';
      outputEl.style.display = 'block';

    } catch (err) {
      statusEl.textContent = 'Request failed: ' + err.message;
    } finally {
      analyzeBtn.disabled = false;
      analyzeBtn.textContent = 'Analyze →';
    }
  }

  function copyBlock(btn, id) {
    const text = document.getElementById(id).textContent;
    navigator.clipboard.writeText(text).then(() => {
      const orig = btn.textContent;
      btn.textContent = 'Copied ✔';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 2000);
    });
  }
</script>

</body>
</html>
