<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Grow Stars — Prospecting Tool</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#faf9f6;--surface:#ffffff;--surface2:#f4f2ed;--surface3:#ede9e3;
  --border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.16);
  --text:#1a1a1a;--muted:#6b6560;--hint:#a09890;
  --accent:#c8a96e;--accent-dim:rgba(200,169,110,0.13);
  --green:#2d7a47;--green-dim:rgba(45,122,71,0.10);
  --amber:#b56520;--amber-dim:rgba(181,101,32,0.10);
  --red:#b53030;--red-dim:rgba(181,48,48,0.10);
  --shadow-sm:0 1px 3px rgba(0,0,0,0.07),0 2px 8px rgba(0,0,0,0.04);
  --shadow:0 2px 8px rgba(0,0,0,0.09),0 6px 24px rgba(0,0,0,0.05);
}
html{background:var(--bg);color:var(--text);font-family:Arial,'Helvetica Neue',sans-serif;font-size:17px;line-height:1.6;}
body{min-height:100vh;display:flex;flex-direction:column;}

nav{display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;border-bottom:1px solid var(--border2);position:sticky;top:0;z-index:10;background:rgba(250,249,246,0.96);backdrop-filter:blur(12px);}
.logo{font-family:Georgia,'Times New Roman',serif;font-size:19px;color:var(--text);letter-spacing:-0.01em;}
.logo span{color:var(--accent);}
.nav-tabs{display:flex;gap:4px;}
.nav-tab{font-size:13px;color:var(--muted);padding:6px 14px;border-radius:8px;border:none;background:transparent;cursor:pointer;transition:all 0.2s;font-family:Arial,sans-serif;}
.nav-tab:hover{color:var(--text);background:var(--surface2);}
.nav-tab.active{color:var(--accent);background:var(--accent-dim);font-weight:600;}

.page{display:none;flex:1;}
.page.active{display:flex;flex-direction:column;}

/* AUDIT PAGE */
.audit-wrap{max-width:640px;margin:0 auto;padding:3rem 2rem 5rem;width:100%;}
.page-title{font-family:Georgia,'Times New Roman',serif;font-size:34px;color:var(--text);margin-bottom:8px;letter-spacing:-0.02em;}
.page-sub{font-size:15px;color:var(--muted);margin-bottom:2rem;}
.search-card{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:1.25rem;box-shadow:var(--shadow-sm);}
.input-row{display:flex;gap:8px;}
.search-input{flex:1;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:11px 14px;font-family:Arial,sans-serif;font-size:15px;color:var(--text);outline:none;transition:border-color 0.2s,box-shadow 0.2s;}
.search-input::placeholder{color:var(--hint);}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim);}
.btn{font-family:Arial,sans-serif;font-size:14px;padding:10px 18px;border-radius:10px;border:1px solid var(--border2);background:var(--surface);color:var(--text);cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.btn:hover{background:var(--surface2);}
.btn:active{transform:scale(0.97);}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600;}
.btn-primary:hover{background:#b8954e;border-color:#b8954e;}
.btn-green{background:var(--green-dim);color:var(--green);border-color:rgba(45,122,71,0.3);font-weight:600;}
.btn-green:hover{background:rgba(45,122,71,0.18);}
.btn-pdf{color:var(--accent);border-color:rgba(200,169,110,0.4);background:var(--accent-dim);font-weight:600;}
.btn-pdf:hover{background:rgba(200,169,110,0.22);}
.btn-sm{padding:6px 12px;font-size:13px;border-radius:8px;}

#status{text-align:center;font-size:13px;color:var(--muted);min-height:20px;margin:1rem 0;display:flex;align-items:center;justify-content:center;gap:8px;}
.spinner{width:14px;height:14px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;display:none;}
@keyframes spin{to{transform:rotate(360deg);}}

#results{display:none;margin-top:2rem;animation:fadeUp 0.4s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

.biz-row{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap;}
.biz-name{font-family:Georgia,'Times New Roman',serif;font-size:26px;color:var(--text);letter-spacing:-0.02em;}
.biz-address{font-size:14px;color:var(--muted);margin-top:3px;}
.biz-actions{display:flex;gap:8px;flex-shrink:0;}

.score-hero{display:grid;grid-template-columns:auto 1fr;gap:1.5rem;align-items:center;background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:1.5rem;margin-bottom:1.25rem;box-shadow:var(--shadow-sm);}
.score-ring-wrap{position:relative;width:84px;height:84px;flex-shrink:0;}
.score-ring-wrap svg{position:absolute;top:0;left:0;transform:rotate(-90deg);}
.score-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.score-num{font-family:Georgia,'Times New Roman',serif;font-size:30px;line-height:1;color:var(--text);}
.score-denom{font-size:11px;color:var(--muted);}
.score-info h2{font-family:Georgia,'Times New Roman',serif;font-size:22px;color:var(--text);margin-bottom:6px;}
.score-info p{font-size:15px;color:var(--muted);line-height:1.5;}

.pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1.25rem;}
.pill{font-size:12px;padding:4px 11px;border-radius:20px;border:1px solid;font-weight:600;}
.pill-bad{color:var(--red);background:var(--red-dim);border-color:rgba(181,48,48,0.25);}
.pill-warn{color:var(--amber);background:var(--amber-dim);border-color:rgba(181,101,32,0.25);}
.pill-good{color:var(--green);background:var(--green-dim);border-color:rgba(45,122,71,0.25);}

.checks{display:flex;flex-direction:column;gap:10px;margin-bottom:1.5rem;}
.check-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.2rem 1.4rem;box-shadow:var(--shadow-sm);}
.check-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.check-left{display:flex;align-items:center;gap:9px;}
.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.check-name{font-family:Georgia,'Times New Roman',serif;font-size:15px;font-weight:700;color:var(--text);}
.check-pts{font-size:14px;font-weight:700;}
.check-val{font-size:14px;color:var(--muted);margin-bottom:6px;}
.check-rec{font-size:14px;line-height:1.6;}
.bar-track{height:5px;background:var(--border2);border-radius:3px;margin-top:10px;}
.bar-fill{height:5px;border-radius:3px;transition:width 0.8s cubic-bezier(0.16,1,0.3,1);}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:100;align-items:center;justify-content:center;padding:1.5rem;}
.modal-bg.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:1.75rem;max-width:520px;width:100%;animation:fadeUp 0.3s ease;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow);}
.modal h3{font-family:Georgia,'Times New Roman',serif;font-size:20px;color:var(--text);margin-bottom:4px;}
.modal-sub{font-size:13px;color:var(--muted);margin-bottom:1.25rem;}
.msg-tabs{display:flex;gap:6px;margin-bottom:1rem;}
.msg-tab{font-size:12px;padding:5px 12px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;font-family:Arial,sans-serif;}
.msg-tab.active{background:var(--accent-dim);color:var(--accent);border-color:rgba(200,169,110,0.4);font-weight:600;}
.modal textarea{width:100%;min-height:180px;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:12px 14px;font-family:Arial,sans-serif;font-size:13px;line-height:1.6;color:var(--text);outline:none;resize:vertical;}
.modal-actions{display:flex;gap:8px;margin-top:1rem;justify-content:flex-end;}

/* PROSPECTS */
.prospects-wrap{max-width:900px;margin:0 auto;padding:3rem 2rem 5rem;width:100%;}
.prospects-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:1rem;}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;}
.filter-btn{font-size:12px;padding:5px 12px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;transition:all 0.2s;font-family:Arial,sans-serif;}
.filter-btn:hover{color:var(--text);}
.filter-btn.active{background:var(--accent-dim);color:var(--accent);border-color:rgba(200,169,110,0.4);font-weight:600;}
.prospect-table{display:flex;flex-direction:column;gap:8px;}
.prospect-row{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1rem 1.25rem;display:grid;grid-template-columns:1fr auto auto auto;gap:1rem;align-items:center;box-shadow:var(--shadow-sm);transition:border-color 0.2s,box-shadow 0.2s;}
.prospect-row:hover{border-color:var(--border2);box-shadow:var(--shadow);}
.pr-name{font-size:14px;font-weight:700;color:var(--text);}
.pr-address{font-size:12px;color:var(--muted);margin-top:2px;}
.pr-score{font-family:Georgia,'Times New Roman',serif;font-size:20px;text-align:center;}
.pr-score span{font-size:11px;font-family:Arial,sans-serif;color:var(--muted);display:block;}
.status-select{font-family:Arial,sans-serif;font-size:12px;padding:5px 10px;border-radius:8px;border:1px solid var(--border2);background:var(--surface2);color:var(--text);cursor:pointer;outline:none;}
.pr-actions{display:flex;gap:6px;}
.empty-state{text-align:center;padding:4rem 2rem;color:var(--muted);}
.empty-state p{font-size:15px;}

footer{margin-top:auto;padding:1.25rem 2rem;border-top:1px solid var(--border2);text-align:center;font-size:12px;color:var(--hint);}

@media(max-width:600px){
  .input-row{flex-direction:column;}
  .score-hero{grid-template-columns:1fr;text-align:center;justify-items:center;}
  .biz-row{flex-direction:column;}
  .prospect-row{grid-template-columns:1fr auto;grid-template-rows:auto auto;}
  nav{padding:0.75rem 1rem;}
  .audit-wrap,.prospects-wrap{padding:2rem 1.25rem 4rem;}
}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<nav>
  <div class="logo">Grow<span>Stars</span></div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('audit')">Audit</button>
    <button class="nav-tab" onclick="showPage('prospects')" id="prospects-tab">Prospects <span id="prospect-count" style="display:none;background:var(--accent-dim);color:var(--accent);font-size:10px;padding:1px 6px;border-radius:10px;margin-left:4px;"></span></button>
  </div>
</nav>

<!-- AUDIT PAGE -->
<div class="page active" id="page-audit">
  <div class="audit-wrap">
    <h1 class="page-title">Audit a business</h1>
    <p class="page-sub">Search any business to see their Google reputation score.</p>
    <div class="search-card">
      <div class="input-row">
        <input class="search-input" id="bizInput" type="text" placeholder="Business name + city (e.g. Jollibee Pulilan Bulacan)"/>
        <button class="btn btn-primary" id="auditBtn" onclick="runAudit()">Run audit</button>
      </div>
    </div>
    <div id="status"><div class="spinner" id="spinner"></div><span id="statusText"></span></div>
    <div id="results">
      <div class="biz-row">
        <div class="biz-info">
          <div class="biz-name" id="bizName"></div>
          <div class="biz-address" id="bizAddress"></div>
        </div>
        <div class="biz-actions">
          <button class="btn btn-sm" onclick="openOutreach()">Outreach ↗</button>
          <button class="btn btn-sm btn-pdf" id="pdfBtn" onclick="downloadPDF()">↓ PDF</button>
          <button class="btn btn-sm btn-green" id="saveBtn" onclick="saveProspect()">+ Save</button>
        </div>
      </div>
      <div class="score-hero">
        <div class="score-ring-wrap">
          <svg width="84" height="84" viewBox="0 0 84 84">
            <circle cx="42" cy="42" r="34" fill="none" stroke="rgba(0,0,0,0.08)" stroke-width="5"/>
            <circle id="ringArc" cx="42" cy="42" r="34" fill="none" stroke="#c8a96e" stroke-width="5" stroke-linecap="round" stroke-dasharray="213.6" stroke-dashoffset="213.6"/>
          </svg>
          <div class="score-inner">
            <div class="score-num" id="scoreNum">0</div>
            <div class="score-denom">/100</div>
          </div>
        </div>
        <div class="score-info">
          <h2 id="scoreGrade"></h2>
          <p id="scoreDesc"></p>
        </div>
      </div>
      <div class="pills" id="pills"></div>
      <div class="checks" id="checks"></div>
    </div>
  </div>
</div>

<!-- PROSPECTS PAGE -->
<div class="page" id="page-prospects">
  <div class="prospects-wrap">
    <div class="prospects-header">
      <div>
        <h1 class="page-title">Prospects</h1>
        <p class="page-sub" id="prospects-sub">All saved businesses.</p>
      </div>
      <div class="filter-row">
        <button class="filter-btn active" onclick="filterProspects('all', this)">All</button>
        <button class="filter-btn" onclick="filterProspects('new', this)">New</button>
        <button class="filter-btn" onclick="filterProspects('contacted', this)">Contacted</button>
        <button class="filter-btn" onclick="filterProspects('call_booked', this)">Call booked</button>
        <button class="filter-btn" onclick="filterProspects('client', this)">Client</button>
      </div>
    </div>
    <div class="prospect-table" id="prospectTable">
      <div class="empty-state"><p>No prospects saved yet. Run an audit and click Save.</p></div>
    </div>
  </div>
</div>

<!-- OUTREACH MODAL -->
<div class="modal-bg" id="outreachModal" onclick="closeModalOutside(event)">
  <div class="modal">
    <h3>Outreach message</h3>
    <div class="modal-sub" id="outreachSub"></div>
    <div class="msg-tabs">
      <button class="msg-tab active" onclick="switchMsg('whatsapp', this)">WhatsApp</button>
      <button class="msg-tab" onclick="switchMsg('email', this)">Email</button>
    </div>
    <textarea id="outreachText" readonly></textarea>
    <div class="modal-actions">
      <button class="btn btn-sm" onclick="closeModal()">Close</button>
      <button class="btn btn-sm btn-primary" onclick="copyMsg()">Copy</button>
    </div>
  </div>
</div>

<footer>© 2025 Grow Stars · Private prospecting tool</footer>

<script>
let auditData = null;
let currentMsgType = 'whatsapp';
let allProspects = [];
let currentFilter = 'all';

function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.querySelectorAll('.nav-tab')[name === 'audit' ? 0 : 1].classList.add('active');
  if (name === 'prospects') loadProspects();
}

function setStatus(msg, loading = false) {
  document.getElementById('statusText').textContent = msg;
  document.getElementById('spinner').style.display = loading ? 'block' : 'none';
}

async function runAudit() {
  const biz = document.getElementById('bizInput').value.trim();
  if (!biz) { setStatus('Enter a business name and city.'); return; }
  const btn = document.getElementById('auditBtn');
  btn.disabled = true;
  document.getElementById('results').style.display = 'none';
  try {
    setStatus('Searching…', true);
    const r1 = await fetch(`/api/audit?action=search&query=${encodeURIComponent(biz)}`);
    const d1 = await r1.json();
    if (!d1.candidates || !d1.candidates.length) { setStatus('Business not found. Try adding city name.'); btn.disabled = false; return; }
    const placeId = d1.candidates[0].place_id;
    setStatus('Fetching profile…', true);
    const r2 = await fetch(`/api/audit?action=details&place_id=${placeId}`);
    const d2 = await r2.json();
    const p = d2.result;
    if (!p) { setStatus('Could not load details.'); btn.disabled = false; return; }
    setStatus('');
    renderAudit(p, placeId);
  } catch(e) { setStatus('Error: ' + e.message); }
  btn.disabled = false;
}

function buildChecks(p) {
  const checks = [];
  const rating = p.rating || 0, total = p.user_ratings_total || 0;
  let rs = 0, rstat = 'bad';
  if (rating >= 4.5 && total >= 50) { rs = 25; rstat = 'good'; }
  else if (rating >= 4.0 && total >= 20) { rs = 18; rstat = 'warn'; }
  else if (rating >= 3.5) { rs = 10; rstat = 'warn'; }
  const rval = `${rating > 0 ? rating.toFixed(1) + ' stars' : 'No rating'} · ${total} review${total !== 1 ? 's' : ''}`;
  const rrec = rstat === 'bad' ? 'Critical: start a review generation campaign — aim for 4.0+ with 20+ reviews.' : rstat === 'warn' ? 'Push toward 4.5+ stars and 50+ reviews to dominate local search.' : 'Excellent — keep a steady review flow.';
  checks.push({ name: 'Rating & reviews', score: rs, max: 25, status: rstat, val: rval, rec: rrec });

  const reviews = p.reviews || [];
  let os = 0, ostat = 'bad', oval = '', orec = '';
  if (reviews.length > 0) {
    const pct = Math.round((reviews.filter(r => r.author_name && r.text).length / reviews.length) * 100);
    if (pct >= 80) { os = 20; ostat = 'good'; } else if (pct >= 50) { os = 12; ostat = 'warn'; } else { os = 4; ostat = 'bad'; }
    oval = `~${pct}% response rate (${reviews.length} reviews sampled)`;
    orec = ostat === 'bad' ? 'Respond to every review within 48 hours — it directly impacts ranking.' : ostat === 'warn' ? 'Aim for 100% response rate.' : 'Great — keep responding fast.';
  } else { oval = 'No reviews in sample'; orec = 'Once reviews come in, respond to all of them.'; }
  checks.push({ name: 'Owner response rate', score: os, max: 20, status: ostat, val: oval, rec: orec });

  const pc = (p.photos || []).length;
  let ps = 0, pstat = 'bad';
  if (pc >= 10) { ps = 20; pstat = 'good'; } else if (pc >= 5) { ps = 13; pstat = 'warn'; } else if (pc >= 1) { ps = 6; pstat = 'warn'; }
  checks.push({ name: 'Photo count', score: ps, max: 20, status: pstat, val: `${pc} photo${pc !== 1 ? 's' : ''}`, rec: pstat === 'bad' ? 'No photos — upload at least 5 quality images now.' : pstat === 'warn' ? 'Target 15+ photos.' : 'Good — update regularly.' });

  const hasHours = p.opening_hours?.weekday_text?.length > 0;
  checks.push({ name: 'Business hours', score: hasHours ? 20 : 0, max: 20, status: hasHours ? 'good' : 'bad', val: hasHours ? 'Hours listed for all days' : 'Hours not listed', rec: hasHours ? 'Update for holidays.' : 'Missing hours cause customers to skip your listing.' });

  const hw = !!p.website, hp = !!p.formatted_phone_number;
  let cs = 0, cstat = 'bad';
  if (hw && hp) { cs = 15; cstat = 'good'; } else if (hw || hp) { cs = 8; cstat = 'warn'; }
  const cval = [hw ? 'Website ✓' : 'No website', hp ? 'Phone ✓' : 'No phone'].join(' · ');
  const crec = cstat === 'bad' ? 'Both website and phone missing — add them immediately.' : cstat === 'warn' ? `Add ${!hw ? 'a website' : 'a phone number'}.` : 'Contact info complete.';
  checks.push({ name: 'Website & phone', score: cs, max: 15, status: cstat, val: cval, rec: crec });

  return checks;
}

function renderAudit(p, placeId) {
  auditData = { ...p, place_id: placeId };
  const checks = buildChecks(p);
  const total = checks.reduce((a, c) => a + c.score, 0);

  document.getElementById('bizName').textContent = p.name;
  document.getElementById('bizAddress').textContent = p.formatted_address || '';
  document.getElementById('saveBtn').textContent = '+ Save';
  document.getElementById('saveBtn').disabled = false;
  document.getElementById('saveBtn').style.color = '';

  const circ = 213.6;
  const offset = circ - (total / 100) * circ;
  let grade, desc, ringColor;
  if (total >= 80) { grade = 'Strong profile'; desc = 'Small tweaks can push you to the top.'; ringColor = '#2d7a47'; }
  else if (total >= 60) { grade = 'Needs improvement'; desc = 'Key gaps are costing you leads.'; ringColor = '#b56520'; }
  else if (total >= 40) { grade = 'Significant gaps'; desc = 'Several issues hurting visibility and trust.'; ringColor = '#b56520'; }
  else { grade = 'Critical issues'; desc = 'Immediate action needed to compete locally.'; ringColor = '#b53030'; }

  document.getElementById('ringArc').setAttribute('stroke', ringColor);
  setTimeout(() => {
    document.getElementById('ringArc').style.transition = 'stroke-dashoffset 1s cubic-bezier(0.16,1,0.3,1)';
    document.getElementById('ringArc').style.strokeDashoffset = offset;
    animateNum('scoreNum', 0, total, 900);
  }, 100);
  document.getElementById('scoreGrade').textContent = grade;
  document.getElementById('scoreDesc').textContent = desc;

  const badC = checks.filter(c => c.status === 'bad'), warnC = checks.filter(c => c.status === 'warn'), goodC = checks.filter(c => c.status === 'good');
  document.getElementById('pills').innerHTML =
    badC.map(c => `<span class="pill pill-bad">✗ ${c.name}</span>`).join('') +
    warnC.map(c => `<span class="pill pill-warn">~ ${c.name}</span>`).join('') +
    goodC.map(c => `<span class="pill pill-good">✓ ${c.name}</span>`).join('');

  const colors = { good:'#2d7a47', warn:'#b56520', bad:'#b53030' };
  document.getElementById('checks').innerHTML = checks.map(c => {
    const pct = Math.round((c.score / c.max) * 100);
    return `<div class="check-card">
      <div class="check-top">
        <div class="check-left"><div class="sdot" style="background:${colors[c.status]}"></div><div class="check-name">${c.name}</div></div>
        <div class="check-pts" style="color:${colors[c.status]}">${c.score}/${c.max}</div>
      </div>
      <div class="check-val">${c.val}</div>
      <div class="check-rec" style="color:${colors[c.status]}">${c.rec}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${colors[c.status]};"></div></div>
    </div>`;
  }).join('');

  const resultsEl = document.getElementById('results');
  resultsEl.style.display = 'block';
  setTimeout(() => resultsEl.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
}

async function saveProspect() {
  if (!auditData) return;
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = 'Saving…';
  const p = auditData;
  const checks = buildChecks(p);
  const total = checks.reduce((a, c) => a + c.score, 0);
  const payload = {
    business_name: p.name, address: p.formatted_address || '', place_id: p.place_id || '',
    score: total, rating: p.rating || 0, review_count: p.user_ratings_total || 0,
    has_hours: !!(p.opening_hours?.weekday_text?.length), has_website: !!p.website,
    has_phone: !!p.formatted_phone_number, photo_count: (p.photos || []).length, status: 'new'
  };
  try {
    const r = await fetch('/api/audit?action=save', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
    const data = await r.json();
    if (data && !data.error) {
      btn.textContent = '✓ Saved';
      btn.style.color = '#2d7a47';
      updateProspectCount();
    } else { btn.textContent = 'Error'; btn.disabled = false; }
  } catch(e) { btn.textContent = 'Error'; btn.disabled = false; }
}

async function loadProspects() {
  document.getElementById('prospectTable').innerHTML = '<div class="empty-state"><p>Loading…</p></div>';
  try {
    const r = await fetch('/api/audit?action=prospects');
    allProspects = await r.json();
    if (!Array.isArray(allProspects)) allProspects = [];
    updateProspectCount();
    renderProspects();
  } catch(e) {
    document.getElementById('prospectTable').innerHTML = '<div class="empty-state"><p>Could not load prospects.</p></div>';
  }
}

function renderProspects() {
  const filtered = currentFilter === 'all' ? allProspects : allProspects.filter(p => p.status === currentFilter);
  document.getElementById('prospects-sub').textContent = `${filtered.length} business${filtered.length !== 1 ? 'es' : ''} ${currentFilter === 'all' ? 'saved' : '· ' + currentFilter.replace('_', ' ')}.`;
  if (!filtered.length) {
    document.getElementById('prospectTable').innerHTML = `<div class="empty-state"><p>${currentFilter === 'all' ? 'No prospects saved yet.' : 'No prospects with this status.'}</p></div>`;
    return;
  }
  const scoreColor = s => s >= 80 ? '#2d7a47' : s >= 50 ? '#b56520' : '#b53030';
  document.getElementById('prospectTable').innerHTML = filtered.map(p => `
    <div class="prospect-row">
      <div><div class="pr-name">${p.business_name}</div><div class="pr-address">${p.address || ''}</div></div>
      <div class="pr-score" style="color:${scoreColor(p.score)}">${p.score}<span>/100</span></div>
      <select class="status-select" onchange="updateStatus('${p.id}', this.value)">
        <option value="new" ${p.status==='new'?'selected':''}>New</option>
        <option value="contacted" ${p.status==='contacted'?'selected':''}>Contacted</option>
        <option value="call_booked" ${p.status==='call_booked'?'selected':''}>Call booked</option>
        <option value="client" ${p.status==='client'?'selected':''}>Client</option>
        <option value="not_interested" ${p.status==='not_interested'?'selected':''}>Not interested</option>
      </select>
      <div class="pr-actions">
        <button class="btn btn-sm" onclick="openOutreachFromProspect(${JSON.stringify(p).replace(/"/g,'&quot;')})">Msg</button>
        <button class="btn btn-sm" style="color:var(--red)" onclick="deleteProspect('${p.id}')">✕</button>
      </div>
    </div>
  `).join('');
}

function filterProspects(status, btn) {
  currentFilter = status;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderProspects();
}

async function updateStatus(id, status) {
  await fetch(`/api/audit?action=update&id=${id}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ status }) });
  const p = allProspects.find(p => p.id === id);
  if (p) p.status = status;
}

async function deleteProspect(id) {
  await fetch(`/api/audit?action=delete&id=${id}`, { method: 'POST' });
  allProspects = allProspects.filter(p => p.id !== id);
  updateProspectCount();
  renderProspects();
}

async function updateProspectCount() {
  if (!allProspects.length) { const r = await fetch('/api/audit?action=prospects'); allProspects = await r.json() || []; }
  const el = document.getElementById('prospect-count');
  if (allProspects.length > 0) { el.style.display = 'inline'; el.textContent = allProspects.length; }
  else { el.style.display = 'none'; }
}

function generateMsg(p, type) {
  const issues = [];
  if ((p.review_count || 0) < 20 || (p.rating || 0) < 4.0) issues.push('few or low-rated reviews');
  if (!p.has_hours) issues.push('missing business hours');
  if (!p.has_website) issues.push('no website listed');
  if ((p.photo_count || 0) < 5) issues.push('few photos');
  const issueText = issues.length ? `I noticed a few things holding it back: ${issues.join(', ')}.` : 'There are a few quick improvements that could boost visibility.';
  const name = p.business_name || p.name, score = p.score;
  if (type === 'whatsapp') {
    return `Hi! I was looking at ${name}'s Google profile and ran a quick audit — it scored ${score}/100. ${issueText}\n\nI help local businesses get more 5-star reviews and improve their Google ranking automatically. Would you be open to a quick 15-minute chat this week to see if it's a fit?\n\n— [Your name] | Grow Stars`;
  } else {
    return `Subject: Quick note about ${name}'s Google reputation\n\nHi,\n\nI came across ${name} on Google and ran a quick reputation audit — your profile scored ${score}/100. ${issueText}\n\nI work with local businesses to automate review generation, manage responses, and improve Google rankings — usually seeing results within 30 days.\n\nWould you be open to a 15-minute call this week? Happy to share what I found in more detail.\n\nBest,\n[Your name]\nGrow Stars`;
  }
}

function openOutreach() {
  if (!auditData) return;
  const p = { ...auditData, score: buildChecks(auditData).reduce((a, c) => a + c.score, 0) };
  document.getElementById('outreachSub').textContent = `${p.name} · Score: ${p.score}/100`;
  currentMsgType = 'whatsapp';
  document.querySelectorAll('.msg-tab').forEach((t, i) => t.classList.toggle('active', i === 0));
  document.getElementById('outreachText').value = generateMsg(p, 'whatsapp');
  document.getElementById('outreachModal').classList.add('open');
}

function openOutreachFromProspect(p) {
  document.getElementById('outreachSub').textContent = `${p.business_name} · Score: ${p.score}/100`;
  currentMsgType = 'whatsapp';
  document.querySelectorAll('.msg-tab').forEach((t, i) => t.classList.toggle('active', i === 0));
  document.getElementById('outreachText').value = generateMsg(p, 'whatsapp');
  document.getElementById('outreachModal').classList.add('open');
}

function switchMsg(type, btn) {
  currentMsgType = type;
  document.querySelectorAll('.msg-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  const sub = document.getElementById('outreachSub').textContent;
  const nameMatch = sub.match(/^(.+) · Score: (\d+)/);
  if (!nameMatch) return;
  const fakePros = { business_name: nameMatch[1], score: parseInt(nameMatch[2]) };
  const fullData = auditData && auditData.name === nameMatch[1] ? { ...auditData, score: parseInt(nameMatch[2]) } : fakePros;
  document.getElementById('outreachText').value = generateMsg(fullData, type);
}

function copyMsg() {
  const ta = document.getElementById('outreachText');
  ta.select();
  document.execCommand('copy');
  const btn = document.querySelector('.modal-actions .btn-primary');
  btn.textContent = 'Copied!';
  setTimeout(() => { btn.textContent = 'Copy'; }, 2000);
}

function closeModal() { document.getElementById('outreachModal').classList.remove('open'); }
function closeModalOutside(e) { if (e.target.id === 'outreachModal') closeModal(); }

function animateNum(id, from, to, dur) {
  const el = document.getElementById(id);
  const start = performance.now();
  function step(now) {
    const p = Math.min((now - start) / dur, 1);
    el.textContent = Math.round(from + (to - from) * (1 - Math.pow(1 - p, 3)));
    if (p < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

document.getElementById('bizInput').addEventListener('keydown', e => { if (e.key === 'Enter') runAudit(); });
updateProspectCount();

// ─── PDF GENERATION ───────────────────────────────────────────────────────────
function downloadPDF() {
  if (!auditData) return;
  if (!window.jspdf) { alert('PDF library not loaded yet — please try again.'); return; }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'a4' });

  const checks     = buildChecks(auditData);
  const total      = checks.reduce((a, c) => a + c.score, 0);
  const badChecks  = checks.filter(c => c.status === 'bad');
  const warnChecks = checks.filter(c => c.status === 'warn');
  const goodChecks = checks.filter(c => c.status === 'good');
  const bizName    = auditData.name;
  const bizAddress = auditData.formatted_address || '';
  const now        = new Date();
  const dateStr    = now.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });

  const W = 210, ml = 18, mr = 18, cw = W - ml - mr;

  const C = {
    bg:      [250, 249, 246],
    white:   [255, 255, 255],
    dark:    [26, 26, 26],
    text:    [26, 26, 26],
    muted:   [107, 101, 96],
    border:  [220, 217, 210],
    accent:  [200, 169, 110],
    green:   [45, 122, 71],  greenBg:  [235, 248, 240],
    amber:   [181, 101, 32], amberBg:  [254, 244, 230],
    red:     [181, 48, 48],  redBg:    [254, 235, 235],
  };

  const scoreColor = total >= 80 ? C.green : total >= 60 ? C.amber : C.red;
  const scoreBg    = total >= 80 ? C.greenBg : total >= 60 ? C.amberBg : C.redBg;

  let grade, gradeDesc;
  if (total >= 80)      { grade = 'Strong Profile';    gradeDesc = 'Small tweaks can push you to the top of local search.'; }
  else if (total >= 60) { grade = 'Needs Improvement'; gradeDesc = 'Key profile gaps are costing you leads every day.'; }
  else if (total >= 40) { grade = 'Significant Gaps';  gradeDesc = 'Several issues are actively hurting your visibility.'; }
  else                  { grade = 'Critical Issues';   gradeDesc = 'Immediate action is needed to compete locally.'; }

  const insightMap = {
    high: `${bizName}'s profile is performing well — but in competitive local markets, staying ahead means keeping review momentum strong and profile details current. The businesses at the top aren't there by accident.`,
    mid:  `${bizName} has a visible Google presence, but profile gaps are causing potential customers to choose better-optimised competitors before they even click. These aren't hard fixes — they're just not done yet.`,
    low:  `A meaningful number of customers searching for businesses like ${bizName} are landing on a competitor's page instead. Most of the gaps below are fixable in days, not months.`,
    crit: `${bizName}'s Google profile is actively working against the business. In local search, your profile is your shopfront — and right now, it's losing customers before they even see what you offer.`,
  };
  const insight = total >= 80 ? insightMap.high : total >= 60 ? insightMap.mid : total >= 40 ? insightMap.low : insightMap.crit;

  const focusItems = [...badChecks, ...warnChecks].slice(0, 4);
  const focusImpact = {
    'Rating & reviews':    "Fewer than 20 strong reviews signals low trust. Most customers won't choose a business rated below 4.0.",
    'Owner response rate': "89% of buyers read owner replies before deciding. Not responding signals you don't care.",
    'Photo count':         'Profiles with 10+ photos receive significantly more clicks and calls than those with fewer.',
    'Business hours':      'Missing hours causes Google to rank you lower and sends undecided customers to a competitor.',
    'Website & phone':     'Incomplete contact info reduces your ranking and makes it harder for customers to reach you.',
  };

  // ── PAGE 1 ──────────────────────────────────────────────────────────────────

  doc.setFillColor(...C.bg);
  doc.rect(0, 0, W, 297, 'F');

  // Header bar
  doc.setFillColor(...C.dark);
  doc.rect(0, 0, W, 24, 'F');
  doc.setFont('times', 'bold');
  doc.setFontSize(14);
  doc.setTextColor(...C.accent);
  doc.text('Grow', ml, 15);
  doc.setTextColor(240, 237, 232);
  doc.text('Stars', ml + doc.getTextWidth('Grow') + 0.5, 15);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(8);
  doc.setTextColor(150, 145, 138);
  doc.text('Google Reputation Audit Report', W - mr, 15, { align: 'right' });

  // Business name block
  let y = 34;
  doc.setFont('times', 'bold');
  doc.setFontSize(22);
  doc.setTextColor(...C.dark);
  const nameLines = doc.splitTextToSize(bizName, cw - 30);
  doc.text(nameLines, ml, y);
  y += nameLines.length * 9;
  if (bizAddress) {
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(9);
    doc.setTextColor(...C.muted);
    doc.text(bizAddress, ml, y);
    y += 5;
  }
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(8);
  doc.setTextColor(...C.muted);
  doc.text(`Audit prepared: ${dateStr}`, ml, y);
  y += 10;

  // Score hero card
  const heroH = 40;
  doc.setFillColor(...C.white);
  doc.setDrawColor(...C.border);
  doc.setLineWidth(0.3);
  doc.roundedRect(ml, y, cw, heroH, 3, 3, 'FD');
  // Score box
  doc.setFillColor(...scoreBg);
  doc.roundedRect(ml + 4, y + 4, 32, 32, 2, 2, 'F');
  doc.setFont('times', 'bold');
  doc.setFontSize(26);
  doc.setTextColor(...scoreColor);
  doc.text(String(total), ml + 20, y + 20, { align: 'center' });
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(8);
  doc.setTextColor(...C.muted);
  doc.text('out of 100', ml + 20, y + 27, { align: 'center' });
  // Grade
  doc.setFont('times', 'bold');
  doc.setFontSize(15);
  doc.setTextColor(...C.dark);
  doc.text(grade, ml + 42, y + 14);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(9);
  doc.setTextColor(...C.muted);
  doc.text(gradeDesc, ml + 42, y + 21);
  // Mini stats
  let sx = ml + 42;
  [{ n: badChecks.length, label: 'critical', color: C.red },
   { n: warnChecks.length, label: 'warnings', color: C.amber },
   { n: goodChecks.length, label: 'passed', color: C.green }
  ].forEach((s, i) => {
    doc.setFont('helvetica', 'bold'); doc.setFontSize(8); doc.setTextColor(...s.color);
    const txt = `${s.n} ${s.label}`; doc.text(txt, sx, y + 30); sx += doc.getTextWidth(txt) + 2;
    if (i < 2) { doc.setTextColor(...C.muted); doc.text('  ·  ', sx, y + 30); sx += doc.getTextWidth('  ·  '); }
  });
  y += heroH + 8;

  // Insight quote block
  const insightLines = doc.splitTextToSize(insight, cw - 14);
  const quoteH = 8 + insightLines.length * 5.5 + 8;
  doc.setFillColor(245, 243, 238);
  doc.setDrawColor(...C.accent);
  doc.setLineWidth(0.3);
  doc.roundedRect(ml, y, cw, quoteH, 2, 2, 'FD');
  doc.setFillColor(...C.accent);
  doc.rect(ml, y, 3.5, quoteH, 'F');
  doc.setFont('times', 'italic');
  doc.setFontSize(9.5);
  doc.setTextColor(...C.dark);
  doc.text(insightLines, ml + 8, y + 7);
  y += quoteH + 8;

  // Numbered focus items
  if (focusItems.length > 0) {
    doc.setFont('helvetica', 'bold'); doc.setFontSize(7.5); doc.setTextColor(...C.accent);
    doc.text('WHAT NEEDS ATTENTION', ml, y);
    doc.setDrawColor(...C.accent); doc.setLineWidth(0.35);
    doc.line(ml, y + 2, ml + cw, y + 2);
    y += 8;
    focusItems.forEach((c, i) => {
      const color = c.status === 'bad' ? C.red : C.amber;
      const impLines = doc.splitTextToSize(focusImpact[c.name] || c.rec, cw - 22);
      const rowH = 8 + impLines.length * 5 + 6;
      doc.setFillColor(...C.white); doc.setDrawColor(...C.border); doc.setLineWidth(0.2);
      doc.roundedRect(ml, y, cw, rowH, 2, 2, 'FD');
      // Gold number badge
      doc.setFillColor(...C.accent);
      doc.roundedRect(ml + 4, y + (rowH - 9) / 2, 9, 9, 1.5, 1.5, 'F');
      doc.setFont('helvetica', 'bold'); doc.setFontSize(9); doc.setTextColor(255, 255, 255);
      doc.text(String(i + 1), ml + 8.5, y + (rowH - 9) / 2 + 6.5, { align: 'center' });
      doc.setFont('times', 'bold'); doc.setFontSize(10); doc.setTextColor(...C.dark);
      doc.text(c.name, ml + 18, y + 8);
      doc.setFont('helvetica', 'bold'); doc.setFontSize(8); doc.setTextColor(...color);
      doc.text(`${c.score}/${c.max} pts`, W - mr - 2, y + 8, { align: 'right' });
      doc.setFont('helvetica', 'normal'); doc.setFontSize(8.5); doc.setTextColor(...C.muted);
      doc.text(impLines, ml + 18, y + 14);
      y += rowH + 4;
    });
  }

  // Dark CTA box
  const ctaY = Math.max(y + 4, 232);
  doc.setFillColor(...C.dark);
  doc.roundedRect(ml, ctaY, cw, 44, 3, 3, 'F');
  doc.setFont('times', 'bold'); doc.setFontSize(14); doc.setTextColor(255, 255, 255);
  doc.text('Ready to fix this?', ml + 8, ctaY + 13);
  doc.setFont('helvetica', 'normal'); doc.setFontSize(8.5); doc.setTextColor(180, 175, 168);
  doc.text("We'll walk through your profile and show you exactly what to prioritise first.", ml + 8, ctaY + 21);
  doc.text('No pitch. No obligation. Just a clear plan.', ml + 8, ctaY + 27);
  // Gold button
  const btnX = ml + 8, btnY = ctaY + 31, btnW = 64, btnH = 11;
  doc.setFillColor(...C.accent);
  doc.roundedRect(btnX, btnY, btnW, btnH, 2, 2, 'F');
  doc.setFont('helvetica', 'bold'); doc.setFontSize(8.5); doc.setTextColor(...C.dark);
  doc.text('Book a Free 15-Min Call  \u2192', btnX + btnW / 2, btnY + 7.5, { align: 'center' });
  doc.link(btnX, btnY, btnW, btnH, { url: 'https://calendly.com/growstars/audit' });

  // ── PAGE 2 ──────────────────────────────────────────────────────────────────

  doc.addPage();
  doc.setFillColor(...C.bg);
  doc.rect(0, 0, W, 297, 'F');

  // Small header
  doc.setFillColor(...C.dark);
  doc.rect(0, 0, W, 16, 'F');
  doc.setFont('helvetica', 'bold'); doc.setFontSize(8); doc.setTextColor(...C.accent);
  doc.text('GrowStars', ml, 11);
  doc.setFont('helvetica', 'normal'); doc.setTextColor(160, 155, 148);
  doc.text(`Full Audit Breakdown \u2014 ${bizName}`, ml + doc.getTextWidth('GrowStars') + 4, 11);
  doc.text(dateStr, W - mr, 11, { align: 'right' });

  y = 26;
  doc.setFont('helvetica', 'bold'); doc.setFontSize(7.5); doc.setTextColor(...C.accent);
  doc.text('FULL AUDIT BREAKDOWN', ml, y);
  doc.setDrawColor(...C.accent); doc.setLineWidth(0.35);
  doc.line(ml, y + 2, ml + cw, y + 2);
  y += 10;

  checks.forEach(c => {
    const color    = c.status === 'good' ? C.green : c.status === 'warn' ? C.amber : C.red;
    const pct      = c.score / c.max;
    const recLines = doc.splitTextToSize(c.rec, cw - 14);
    const cardH    = 23 + recLines.length * 5;
    if (y + cardH > 270) { doc.addPage(); doc.setFillColor(...C.bg); doc.rect(0, 0, W, 297, 'F'); y = 20; }
    doc.setFillColor(...C.white); doc.setDrawColor(...C.border); doc.setLineWidth(0.2);
    doc.roundedRect(ml, y, cw, cardH, 2, 2, 'FD');
    doc.setFillColor(...color);
    doc.roundedRect(ml, y, 4, cardH, 2, 0, 'F');
    doc.setFont('times', 'bold'); doc.setFontSize(10); doc.setTextColor(...C.dark);
    doc.text(c.name, ml + 8, y + 8);
    doc.setFont('helvetica', 'bold'); doc.setFontSize(10); doc.setTextColor(...color);
    doc.text(`${c.score}/${c.max}`, W - mr - 2, y + 8, { align: 'right' });
    const barW = 35, barX = W - mr - barW - 14;
    doc.setFillColor(220, 217, 210); doc.roundedRect(barX, y + 5, barW, 3, 1, 1, 'F');
    if (pct > 0) { doc.setFillColor(...color); doc.roundedRect(barX, y + 5, barW * pct, 3, 1, 1, 'F'); }
    doc.setFont('helvetica', 'normal'); doc.setFontSize(8); doc.setTextColor(...C.muted);
    doc.text(c.val, ml + 8, y + 15);
    doc.setFont('helvetica', 'normal'); doc.setFontSize(8.5); doc.setTextColor(...C.text);
    doc.text(recLines, ml + 8, y + 21);
    y += cardH + 5;
  });

  // Soft footer CTA
  const footerY = Math.max(y + 4, 252);
  doc.setFillColor(242, 239, 232); doc.setDrawColor(...C.border); doc.setLineWidth(0.3);
  doc.roundedRect(ml, footerY, cw, 28, 2, 2, 'FD');
  doc.setFont('times', 'bold'); doc.setFontSize(11); doc.setTextColor(...C.dark);
  doc.text('Want us to handle this for you?', ml + cw / 2, footerY + 10, { align: 'center' });
  doc.setFont('helvetica', 'normal'); doc.setFontSize(9); doc.setTextColor(...C.muted);
  doc.text('Book a free strategy call at growstars.com — or simply reply to this report.', ml + cw / 2, footerY + 17, { align: 'center' });
  doc.setFont('helvetica', 'bold'); doc.setFontSize(8.5); doc.setTextColor(...C.accent);
  doc.text('growstars.com/book', ml + cw / 2, footerY + 23, { align: 'center' });

  // Page footers
  const pageCount = doc.getNumberOfPages();
  for (let i = 1; i <= pageCount; i++) {
    doc.setPage(i);
    doc.setFont('helvetica', 'normal'); doc.setFontSize(7.5); doc.setTextColor(...C.muted);
    doc.text('Grow Stars \u00b7 Confidential', ml, 291);
    doc.text(`${i} / ${pageCount}`, W - mr, 291, { align: 'right' });
  }

  const safeName = bizName.replace(/[^a-z0-9]/gi, '_').toLowerCase();
  const dp = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
  doc.save(`growstars_audit_${safeName}_${dp}.pdf`);
}
