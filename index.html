<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GrowStars — Lead Runner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@1,900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #fffdf8;
      --white: #ffffff;
      --surface: #f7f5f0;
      --border: rgba(0,0,0,0.09);
      --border2: rgba(0,0,0,0.16);
      --text: #120f0a;
      --muted: #9a8e80;
      --gold: #C9963A;
      --gold-dim: rgba(201,150,58,0.12);
      --gold-dark: #a8863e;
    }

    html { background: #f5f1ea; color: var(--text); font-family: 'Inter', 'DM Sans', Arial, sans-serif; font-size: 16px; line-height: 1.6; }
    body { min-height: 100vh; display: flex; flex-direction: column; }

    /* ── NAV ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 16px 24px;
      position: absolute;
      top: 0; right: 0;
      z-index: 20;
    }

    .nav-link {
      font-size: 12px;
      color: #999;
      text-decoration: none;
      padding: 5px 12px;
      border-radius: 7px;
      border: 1px solid #ddd;
      background: var(--white);
      font-weight: 500;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .nav-link:hover { background: #eee; color: #555; }

    /* ── HERO ── */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 80px 20px 52px;
    }

    .hero-rule {
      width: 36px;
      height: 1px;
      background: #C9963A;
    }

    .hero-rule.top { margin-bottom: 18px; }
    .hero-rule.bottom { margin-top: 32px; }

    .hero-brand {
      font-family: 'Playfair Display', Georgia, serif;
      font-style: italic;
      font-weight: 900;
      font-size: 15px;
      line-height: 1;
      margin-bottom: 14px;
    }

    .hero-brand .black { color: #1a1208; }
    .hero-brand .gold  { color: #C9963A; }

    .hero-ornament {
      display: flex;
      gap: 7px;
      align-items: center;
      margin-bottom: 22px;
    }

    .hero-ornament span {
      display: block;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #C9963A;
    }

    .hero-headline {
      margin-bottom: 18px;
    }

    .hero-headline div {
      font-family: 'Playfair Display', Georgia, serif;
      font-style: italic;
      font-weight: 900;
      font-size: 38px;
      line-height: 1.05;
    }

    .hero-headline .line-dark   { color: #1a1208; }
    .hero-headline .line-gold   { color: #C9963A; }

    .hero p {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 13px;
      color: #9a8e7a;
      max-width: 320px;
      line-height: 1.65;
      margin-bottom: 28px;
    }

    /* ── INPUT GROUP ── */
    .input-group {
      width: 100%;
      max-width: 460px;
      display: flex;
      gap: 8px;
      align-items: stretch;
      margin-bottom: 20px;
    }

    .input-group input {
      flex: 1;
      border: 0.5px solid #d4c9b0;
      border-radius: 3px;
      outline: none;
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      color: #1a1208;
      background: #ffffff;
      padding: 13px 14px;
      transition: border-color 0.15s;
    }

    .input-group input:focus { border-color: #C9963A; }
    .input-group input::placeholder { color: #c5bdb0; }

    .input-group button {
      padding: 13px 22px;
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      background: #1a1208;
      color: #C9963A;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
      flex-shrink: 0;
    }

    .input-group button:hover { opacity: 0.80; }
    .input-group button:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── CITY HINTS ── */
    .city-hints {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .city-hints-label {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 300;
      color: #b0a898;
      letter-spacing: 0.04em;
    }

    .city-pill {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 400;
      color: #8a7e6e;
      background: rgba(201,150,58,0.08);
      border: 0.5px solid rgba(201,150,58,0.3);
      border-radius: 20px;
      padding: 4px 12px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .city-pill:hover {
      background: rgba(201,150,58,0.16);
      color: #1a1208;
    }

    /* ── STATUS ── */
    #status {
      max-width: 600px;
      margin: 16px auto 0;
      padding: 0 20px;
      font-size: 13px;
      color: var(--muted);
      min-height: 20px;
      text-align: center;
    }

    /* ── LEADS ── */
    #leads {
      max-width: 620px;
      margin: 24px auto 64px;
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .lead-card {
      background: var(--white);
      border: 1px solid rgba(0,0,0,0.09);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .lead-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .lead-name {
      font-size: 15px;
      font-weight: 600;
    }

    .lead-meta {
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
    }

    .lead-observation {
      font-size: 13px;
      color: #444;
      line-height: 1.55;
      margin-bottom: 16px;
      padding: 10px 12px;
      background: var(--gold-dim);
      border-left: 3px solid var(--gold);
      border-radius: 0 6px 6px 0;
    }

    .message-block { margin-bottom: 12px; }

    .message-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 5px;
    }

    .message-text {
      font-size: 13px;
      color: #333;
      line-height: 1.6;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 10px 12px;
      white-space: pre-wrap;
    }

    .lead-actions {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }

    .copy-btn {
      font-size: 13px;
      font-family: inherit;
      font-weight: 500;
      padding: 7px 14px;
      border-radius: 7px;
      border: 1px solid var(--border2);
      background: var(--white);
      color: var(--text);
      cursor: pointer;
      transition: all 0.15s;
    }

    .copy-btn:hover { background: var(--surface); }
    .copy-btn.copied { background: #f0faf4; border-color: #a8d8b8; color: #2a7a4a; }

    .lead-footer {
      margin-top: 12px;
      font-size: 12px;
      color: #bbb;
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    .lead-footer a { color: #bbb; text-decoration: none; }
    .lead-footer a:hover { color: var(--muted); }

    .empty-state {
      text-align: center;
      padding: 48px 0;
      color: var(--muted);
      font-size: 14px;
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-link" href="execution-panel.html" target="_blank">Execution Panel ↗</a>
</nav>

<div class="hero">
  <div class="hero-rule top"></div>
  <div class="hero-brand">
    <span class="black">Grow</span><span class="gold">Stars</span>
  </div>
  <div class="hero-ornament">
    <span></span><span></span><span></span>
  </div>
  <div class="hero-headline">
    <div class="line-dark">Find High-Intent</div>
    <div class="line-gold">Reputation Management</div>
    <div class="line-dark">Leads</div>
  </div>
  <p>Instantly generate qualified local businesses with ready-to-send outreach messages.</p>
  <div class="input-group">
    <input type="text" id="city-input" placeholder="Enter city, e.g. Leeds" />
    <button id="generate-btn" onclick="generateLeads()">Generate Leads</button>
  </div>
  <div class="city-hints">
    <span class="city-hints-label">Try a city —</span>
    <span class="city-pill" onclick="setCity('Leeds')">Leeds</span>
    <span class="city-pill" onclick="setCity('Birmingham')">Birmingham</span>
    <span class="city-pill" onclick="setCity('Manchester')">Manchester</span>
  </div>
  <div class="hero-rule bottom"></div>
</div>

<div id="status"></div>
<div id="leads"></div>

<script>
  const ICP = {
    search_queries: ["hair salon", "hairdresser", "barber shop"],
    min_reviews: 30,
    max_reviews: 400,
  };

  const cityInput   = document.getElementById('city-input');
  const generateBtn = document.getElementById('generate-btn');
  const statusEl    = document.getElementById('status');
  const leadsEl     = document.getElementById('leads');

  cityInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') generateLeads();
  });

  async function generateLeads() {
    const city = cityInput.value.trim();
    if (!city) { cityInput.focus(); return; }

    generateBtn.disabled = true;
    generateBtn.textContent = 'Generating…';
    statusEl.textContent = 'Generating leads…';
    leadsEl.innerHTML = '';

    try {
      const res = await fetch('/api/hitlist', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ city, icp: ICP, limit: 20 }),
      });

      const data = await res.json();

      if (!res.ok) {
        statusEl.textContent = 'Error: ' + (data.error || res.statusText);
        return;
      }

      const hits = data.hits || [];
      statusEl.textContent = hits.length
        ? `${hits.length} lead${hits.length !== 1 ? 's' : ''} found in ${city}`
        : `No leads found in ${city} matching the ICP.`;

      if (hits.length === 0) {
        leadsEl.innerHTML = '<div class="empty-state">No leads matched. Try a different city.</div>';
        return;
      }

      leadsEl.innerHTML = hits.map((lead, i) => renderCard(lead, i)).join('');

    } catch (err) {
      statusEl.textContent = 'Request failed: ' + err.message;
    } finally {
      generateBtn.disabled = false;
      generateBtn.textContent = 'Generate Leads';
    }
  }

  function renderCard(lead, i) {
    const wa   = escHtml(lead.whatsapp_message || '');
    const loom = escHtml(lead.loom_hook || '');
    const obs  = escHtml(lead.observation || '');
    const name = escHtml(lead.name || '');

    return `
      <div class="lead-card" id="card-${i}">
        <div class="lead-header">
          <div class="lead-name">${name}</div>
          <div class="lead-meta">${lead.rating} ⭐ &nbsp;•&nbsp; ${lead.reviews} reviews</div>
        </div>
        <div class="lead-observation">${obs}</div>
        <div class="message-block">
          <div class="message-label">WhatsApp</div>
          <div class="message-text">${wa}</div>
        </div>
        <div class="message-block">
          <div class="message-label">Loom Hook</div>
          <div class="message-text">${loom}</div>
        </div>
        <div class="lead-actions">
          <button class="copy-btn" onclick="copyText(this, ${JSON.stringify(lead.whatsapp_message)})">Copy WhatsApp</button>
          <button class="copy-btn" onclick="copyText(this, ${JSON.stringify(lead.loom_hook)})">Copy Loom</button>
        </div>
        <div class="lead-footer">
          ${lead.phone ? `<span>${escHtml(lead.phone)}</span>` : ''}
          ${lead.website ? `<a href="${escHtml(lead.website)}" target="_blank">${escHtml(lead.website)}</a>` : ''}
          <a href="${escHtml(lead.maps_link)}" target="_blank">Google Maps ↗</a>
        </div>
      </div>`;
  }

  function copyText(btn, text) {
    navigator.clipboard.writeText(text).then(() => {
      const orig = btn.textContent;
      btn.textContent = 'Copied ✔';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = orig;
        btn.classList.remove('copied');
      }, 2000);
    });
  }

  function setCity(city) {
    cityInput.value = city;
    cityInput.focus();
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>

</body>
</html>
