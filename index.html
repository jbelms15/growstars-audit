<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Grow Stars — Audit Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --cream:#fffdf8;--white:#ffffff;--surface:#f7f5f0;--surface2:#efede7;
  --border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.16);
  --text:#1a1a1a;--muted:#6b6560;--hint:#b0a89e;
  --gold:#c8a96e;--gold-dim:rgba(200,169,110,0.15);--gold-dark:#a8863e;
  --green:#2d7a47;--green-dim:rgba(45,122,71,0.10);
  --amber:#b56520;--amber-dim:rgba(181,101,32,0.10);
  --red:#b53030;--red-dim:rgba(181,48,48,0.10);
  --shadow-sm:0 1px 4px rgba(0,0,0,0.07),0 2px 10px rgba(0,0,0,0.04);
  --shadow:0 2px 10px rgba(0,0,0,0.09),0 8px 28px rgba(0,0,0,0.05);
}
html{background:var(--cream);color:var(--text);font-family:'DM Sans',Arial,sans-serif;font-size:16px;line-height:1.6;}
body{min-height:100vh;display:flex;flex-direction:column;}

/* ── NAV ────────────────────────────────────────────────────────── */
nav{display:flex;align-items:center;justify-content:space-between;padding:.9rem 2rem;border-bottom:1px solid var(--border2);position:sticky;top:0;z-index:20;background:rgba(255,253,248,0.97);backdrop-filter:blur(12px);}
.logo{font-family:Georgia,serif;font-size:18px;letter-spacing:-0.01em;color:var(--text);}
.logo span{color:var(--gold);}
.nav-tabs{display:flex;gap:4px;}
.nav-tab{font-size:13px;color:var(--muted);padding:6px 14px;border-radius:8px;border:none;background:transparent;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;font-weight:500;}
.nav-tab:hover{color:var(--text);background:var(--surface);}
.nav-tab.active{color:var(--gold);background:var(--gold-dim);font-weight:600;}

/* ── PAGES ──────────────────────────────────────────────────────── */
.page{display:none;flex:1;flex-direction:column;}
.page.active{display:flex;}

/* ── BUTTONS ────────────────────────────────────────────────────── */
.btn{font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;padding:9px 18px;border-radius:10px;border:1px solid var(--border2);background:var(--white);color:var(--text);cursor:pointer;transition:all .18s;white-space:nowrap;display:inline-flex;align-items:center;gap:6px;}
.btn:hover{background:var(--surface);}
.btn:active{transform:scale(0.97);}
.btn:disabled{opacity:.55;cursor:default;}
.btn-primary{background:var(--gold);color:#1a1a1a;border-color:var(--gold);font-weight:600;}
.btn-primary:hover{background:var(--gold-dark);border-color:var(--gold-dark);}
.btn-dark{background:#1a1a1a;color:#fff;border-color:#1a1a1a;font-weight:600;}
.btn-dark:hover{background:#2e2e2e;border-color:#2e2e2e;}
.btn-ghost{background:transparent;border-color:var(--border2);color:var(--muted);}
.btn-ghost:hover{color:var(--text);background:var(--surface);}
.btn-green{background:var(--green-dim);color:var(--green);border-color:rgba(45,122,71,.3);font-weight:600;}
.btn-green:hover{background:rgba(45,122,71,.18);}
.btn-sm{padding:6px 12px;font-size:13px;border-radius:8px;}
.btn-icon{padding:7px 10px;border-radius:9px;}

/* ── SEARCH PAGE ────────────────────────────────────────────────── */
.search-wrap{max-width:600px;margin:4rem auto 2rem;padding:0 1.5rem;width:100%;}
.search-title{font-family:Georgia,serif;font-size:32px;letter-spacing:-.02em;margin-bottom:.5rem;}
.search-sub{font-size:15px;color:var(--muted);margin-bottom:2rem;}
.search-card{background:var(--white);border:1px solid var(--border2);border-radius:16px;padding:1.25rem;box-shadow:var(--shadow-sm);}
.input-row{display:flex;gap:8px;}
.search-input{flex:1;background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:11px 14px;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s;}
.search-input::placeholder{color:var(--hint);}
.search-input:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-dim);}
.search-results{margin-top:10px;display:flex;flex-direction:column;gap:4px;}
.result-item{padding:10px 14px;border-radius:9px;cursor:pointer;border:1px solid transparent;transition:all .15s;}
.result-item:hover{background:var(--surface);border-color:var(--border);}
.result-name{font-size:14px;font-weight:600;color:var(--text);}
.result-addr{font-size:12px;color:var(--muted);margin-top:1px;}

#status-line{text-align:center;font-size:13px;color:var(--muted);padding:.75rem;display:flex;align-items:center;justify-content:center;gap:8px;min-height:40px;}
.spinner{width:14px;height:14px;border:2px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── DECK UI ────────────────────────────────────────────────────── */
#deck-ui{display:none;flex:1;flex-direction:column;min-height:0;}

.deck-header{display:flex;align-items:center;gap:1rem;padding:.85rem 1.5rem;border-bottom:1px solid var(--border);background:var(--white);flex-wrap:wrap;}
.deck-biz{flex:1;min-width:0;}
.deck-biz-name{font-family:Georgia,serif;font-size:20px;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.deck-biz-meta{font-size:13px;color:var(--muted);margin-top:2px;}
.deck-actions{display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap;}

.deck-body{display:flex;flex:1;min-height:0;overflow:hidden;}

/* Sidebar */
.slide-sidebar{width:200px;flex-shrink:0;border-right:1px solid var(--border);overflow-y:auto;background:var(--surface);padding:.75rem .5rem;}
.slide-nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:9px;cursor:pointer;transition:all .15s;margin-bottom:2px;}
.slide-nav-item:hover{background:var(--surface2);}
.slide-nav-item.active{background:var(--gold-dim);color:var(--gold);}
.slide-nav-item.active .sni-num{color:var(--gold);}
.sni-num{font-size:11px;font-weight:700;color:var(--muted);width:16px;flex-shrink:0;}
.sni-label{font-size:12px;font-weight:500;color:var(--text);line-height:1.3;}
.slide-nav-item.active .sni-label{color:var(--gold-dark);font-weight:600;}

/* Slide stage */
.slide-stage{flex:1;overflow:auto;display:flex;align-items:flex-start;justify-content:center;padding:2rem;background:var(--cream);}
.slide{width:100%;max-width:820px;min-height:460px;border-radius:20px;box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column;justify-content:center;padding:3.5rem 4rem;position:relative;animation:slideIn .3s ease;}
@keyframes slideIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* Deck footer */
.deck-footer{display:flex;align-items:center;justify-content:center;gap:1rem;padding:.85rem;border-top:1px solid var(--border);background:var(--white);}
.slide-counter{font-size:13px;color:var(--muted);font-weight:500;min-width:60px;text-align:center;}

/* ── SLIDE TYPES ────────────────────────────────────────────────── */

/* 0 – Insight */
.slide-insight{background:var(--white);}
.slide-insight .s-eyebrow{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:1.2rem;}
.slide-insight .s-headline{font-family:Georgia,serif;font-size:2.4rem;line-height:1.2;letter-spacing:-.02em;color:var(--text);margin-bottom:1.5rem;}
.slide-insight .s-highlight{background:var(--gold-dim);border-left:4px solid var(--gold);border-radius:0 10px 10px 0;padding:1rem 1.25rem;font-size:1rem;line-height:1.6;color:var(--text);}

/* 1 – Comparison */
.slide-comparison{background:var(--white);}
.slide-comparison .s-title{font-family:Georgia,serif;font-size:1.8rem;letter-spacing:-.02em;margin-bottom:2rem;}
.comp-table{width:100%;border-collapse:collapse;}
.comp-table th{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);padding:.6rem .8rem;border-bottom:2px solid var(--border2);text-align:left;}
.comp-table td{padding:.75rem .8rem;border-bottom:1px solid var(--border);font-size:15px;}
.comp-table tr.you td{background:var(--gold-dim);font-weight:600;}
.comp-table tr.you td:first-child{border-left:4px solid var(--gold);}
.stars{color:var(--gold);}
.review-bar-wrap{display:flex;align-items:center;gap:8px;}
.review-bar{height:6px;border-radius:3px;background:var(--gold);flex-shrink:0;}

/* 2 – Gap */
.slide-gap{background:#1a1a1a;color:#f5f2ec;}
.slide-gap .s-eyebrow{font-size:11px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:1rem;}
.slide-gap .s-big-num{font-family:Georgia,serif;font-size:5rem;line-height:1;color:var(--gold);margin-bottom:.5rem;}
.slide-gap .s-big-label{font-family:Georgia,serif;font-size:1.6rem;color:#f5f2ec;margin-bottom:1.25rem;}
.slide-gap .s-support{font-size:1rem;color:rgba(245,242,236,.65);max-width:480px;line-height:1.6;}

/* 3 – Visibility */
.slide-visibility{background:var(--cream);}
.slide-visibility .s-title{font-family:Georgia,serif;font-size:1.7rem;letter-spacing:-.02em;margin-bottom:1.5rem;}
.slide-visibility .s-quote{font-family:Georgia,serif;font-style:italic;font-size:1.35rem;line-height:1.55;color:var(--text);border-left:5px solid var(--gold);padding:.75rem 1.25rem;margin-bottom:1.25rem;}
.slide-visibility .s-support{font-size:.95rem;color:var(--muted);line-height:1.6;}

/* 4 – Cost */
.slide-cost{background:var(--white);}
.slide-cost .s-title{font-family:Georgia,serif;font-size:1.7rem;letter-spacing:-.02em;margin-bottom:1.5rem;}
.slide-cost .s-money{font-family:Georgia,serif;font-size:3.8rem;color:var(--red);line-height:1;margin-bottom:.5rem;}
.slide-cost .s-money-label{font-size:1rem;color:var(--muted);margin-bottom:1.25rem;}
.slide-cost .s-support{font-size:.95rem;line-height:1.7;color:var(--text);max-width:500px;}

/* 5 – Opportunity */
.slide-opportunity{background:var(--cream);}
.slide-opportunity .s-title{font-family:Georgia,serif;font-size:1.7rem;letter-spacing:-.02em;margin-bottom:1.5rem;}
.slide-opportunity .s-money{font-family:Georgia,serif;font-size:3.8rem;color:var(--green);line-height:1;margin-bottom:.5rem;}
.slide-opportunity .s-money-label{font-size:1rem;color:var(--muted);margin-bottom:1.25rem;}
.slide-opportunity .s-support{font-size:.95rem;line-height:1.7;color:var(--text);max-width:500px;}

/* 6 – How it works */
.slide-how{background:var(--white);}
.slide-how .s-title{font-family:Georgia,serif;font-size:1.7rem;letter-spacing:-.02em;margin-bottom:2.5rem;}
.how-steps{display:flex;gap:0;align-items:flex-start;}
.how-step{flex:1;text-align:center;padding:0 .5rem;}
.how-step-num{width:42px;height:42px;border-radius:50%;background:var(--gold);color:#1a1a1a;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;}
.how-step-label{font-size:1rem;font-weight:600;color:var(--text);margin-bottom:.35rem;}
.how-step-sub{font-size:.85rem;color:var(--muted);line-height:1.4;}
.how-arrow{padding-top:20px;color:var(--border2);font-size:1.5rem;flex-shrink:0;}

/* 7 – CTA */
.slide-cta{background:#1a1a1a;color:#f5f2ec;align-items:center;text-align:center;}
.slide-cta .s-eyebrow{font-size:11px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:1rem;}
.slide-cta .s-headline{font-family:Georgia,serif;font-size:2.6rem;line-height:1.15;letter-spacing:-.02em;margin-bottom:.75rem;}
.slide-cta .s-sub{font-size:1rem;color:rgba(245,242,236,.6);margin-bottom:2.5rem;max-width:420px;}
.slide-cta .btn-cta{background:var(--gold);color:#1a1a1a;border:none;padding:1rem 2.5rem;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;}
.slide-cta .btn-cta:hover{background:var(--gold-dark);transform:translateY(-1px);}

/* ── PRESENTATION MODE ──────────────────────────────────────────── */
#pres-overlay{display:none;position:fixed;inset:0;z-index:100;background:#111;flex-direction:column;}
#pres-overlay.open{display:flex;}
#pres-slide-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem;}
#pres-slide-wrap .slide{max-width:900px;width:100%;}
#pres-nav{display:flex;align-items:center;justify-content:center;gap:1.5rem;padding:1rem;}
#pres-nav .slide-counter{color:rgba(255,255,255,.5);}
#pres-exit{position:fixed;top:1rem;right:1.5rem;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:6px 14px;border-radius:8px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;}
#pres-exit:hover{background:rgba(255,255,255,.2);}

/* ── PROSPECTS PAGE ─────────────────────────────────────────────── */
.prospects-wrap{max-width:900px;margin:0 auto;padding:2.5rem 1.5rem 4rem;width:100%;}
.prospects-title{font-family:Georgia,serif;font-size:26px;letter-spacing:-.02em;margin-bottom:.4rem;}
.prospects-sub{font-size:14px;color:var(--muted);margin-bottom:1.75rem;}
.pipeline{display:flex;gap:10px;overflow-x:auto;padding-bottom:.5rem;margin-bottom:2rem;}
.pipe-col{min-width:200px;flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:.85rem;}
.pipe-col-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:.75rem;display:flex;align-items:center;justify-content:space-between;}
.pipe-col-count{font-size:11px;background:var(--border2);padding:2px 7px;border-radius:10px;color:var(--text);font-weight:700;}
.pipe-card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:.85rem;margin-bottom:6px;cursor:pointer;transition:all .15s;}
.pipe-card:hover{border-color:var(--gold);box-shadow:var(--shadow-sm);}
.pipe-card-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px;}
.pipe-card-meta{font-size:11px;color:var(--muted);}
.pipe-card-score{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px;margin-top:5px;}
.score-high{background:var(--red-dim);color:var(--red);}
.score-medium{background:var(--amber-dim);color:var(--amber);}
.score-low{background:var(--green-dim);color:var(--green);}
.prospects-list{display:flex;flex-direction:column;gap:8px;}
.prospect-row{display:flex;align-items:center;gap:1rem;background:var(--white);border:1px solid var(--border);border-radius:12px;padding:1rem 1.25rem;transition:all .15s;}
.prospect-row:hover{border-color:var(--border2);box-shadow:var(--shadow-sm);}
.pr-name{font-size:14px;font-weight:600;flex:1;}
.pr-meta{font-size:12px;color:var(--muted);}
.pr-status select{font-size:12px;border:1px solid var(--border2);border-radius:7px;padding:4px 8px;background:var(--surface);color:var(--text);cursor:pointer;font-family:'DM Sans',sans-serif;}
.pr-del{font-size:13px;color:var(--red);cursor:pointer;background:none;border:none;padding:4px 8px;border-radius:6px;}
.pr-del:hover{background:var(--red-dim);}

/* ── MODAL ──────────────────────────────────────────────────────── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:50;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--white);border-radius:16px;padding:1.75rem;width:90%;max-width:500px;box-shadow:var(--shadow);max-height:85vh;overflow-y:auto;}
.modal-title{font-family:Georgia,serif;font-size:20px;margin-bottom:.35rem;}
.modal-sub{font-size:13px;color:var(--muted);margin-bottom:1.25rem;}
.modal-textarea{width:100%;border:1px solid var(--border2);border-radius:10px;padding:12px;font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.6;color:var(--text);resize:vertical;background:var(--surface);outline:none;min-height:160px;}
.modal-textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-dim);}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:1rem;}
.msg-tabs{display:flex;gap:4px;margin-bottom:.75rem;}
.msg-tab{font-size:12px;padding:5px 12px;border-radius:7px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;}
.msg-tab.active{background:var(--gold-dim);border-color:var(--gold);color:var(--gold-dark);font-weight:600;}

/* ── PRINT ──────────────────────────────────────────────────────── */
@media print{
  nav,#deck-ui .deck-header,#deck-ui .deck-body .slide-sidebar,#deck-ui .deck-footer,#deck-ui .deck-actions{display:none!important;}
  .slide-stage{padding:0;background:white;}
  .slide{page-break-after:always;border-radius:0;box-shadow:none;max-width:100%;}
}
</style>
</head>
<body>

<nav>
  <div class="logo">Grow<span>Stars</span></div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchTab('audit')">Audit</button>
    <button class="nav-tab" onclick="switchTab('prospects')">Prospects</button>
  </div>
</nav>

<!-- ── AUDIT PAGE ──────────────────────────────────────────────── -->
<div class="page active" id="page-audit">

  <!-- Search -->
  <div class="search-wrap" id="search-section">
    <h1 class="search-title">Business Audit</h1>
    <p class="search-sub">Search a business to generate competitor analysis and outreach materials.</p>
    <div class="search-card">
      <div class="input-row">
        <input id="searchInput" class="search-input" type="text" placeholder="e.g. Joe's Hair Studio, Dublin" autocomplete="off"/>
        <button class="btn btn-primary" onclick="doSearch()">Search</button>
      </div>
      <div id="searchResults" class="search-results"></div>
    </div>
    <div id="status-line"></div>
  </div>

  <!-- Deck UI (shown after analysis) -->
  <div id="deck-ui">
    <div class="deck-header">
      <div class="deck-biz">
        <div class="deck-biz-name" id="deck-biz-name"></div>
        <div class="deck-biz-meta" id="deck-biz-meta"></div>
      </div>
      <div class="deck-actions">
        <button class="btn btn-sm" id="copyWaBtn" onclick="copyWhatsApp()">📋 WhatsApp</button>
        <button class="btn btn-sm" id="copyLoomBtn" onclick="copyLoom()">📋 Loom Script</button>
        <button class="btn btn-sm" onclick="exportPDF()">PDF</button>
        <button class="btn btn-sm btn-green" id="saveBtn" onclick="saveProspect()">+ Save</button>
        <button class="btn btn-sm btn-dark" onclick="enterPresentation()">⛶ Present</button>
        <button class="btn btn-sm btn-ghost" onclick="resetToSearch()">✕</button>
      </div>
    </div>

    <div class="deck-body">
      <aside class="slide-sidebar" id="slideSidebar"></aside>
      <div class="slide-stage" id="slideStage"></div>
    </div>

    <div class="deck-footer">
      <button class="btn btn-icon" onclick="goDeck(-1)">&#8592;</button>
      <span class="slide-counter" id="deckCounter">1 / 8</span>
      <button class="btn btn-icon" onclick="goDeck(1)">&#8594;</button>
    </div>
  </div>
</div>

<!-- ── PROSPECTS PAGE ──────────────────────────────────────────── -->
<div class="page" id="page-prospects">
  <div class="prospects-wrap">
    <h1 class="prospects-title">Prospects</h1>
    <p class="prospects-sub">Track your outreach pipeline.</p>
    <div id="prospectsContainer"><div style="color:var(--muted);font-size:14px;padding:2rem 0">Loading...</div></div>
  </div>
</div>

<!-- ── PRESENTATION OVERLAY ────────────────────────────────────── -->
<div id="pres-overlay">
  <button id="pres-exit" onclick="exitPresentation()">✕ Exit</button>
  <div id="pres-slide-wrap"></div>
  <div id="pres-nav">
    <button class="btn btn-icon" style="background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2);color:#fff;" onclick="goPres(-1)">&#8592;</button>
    <span class="slide-counter" id="presCounter">1 / 8</span>
    <button class="btn btn-icon" style="background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2);color:#fff;" onclick="goPres(1)">&#8594;</button>
  </div>
</div>

<!-- ── OUTREACH MODAL ──────────────────────────────────────────── -->
<div class="modal-overlay" id="outreachModal">
  <div class="modal">
    <div class="modal-title" id="outreachTitle">Outreach Message</div>
    <div class="modal-sub" id="outreachSub"></div>
    <div class="msg-tabs">
      <button class="msg-tab active" onclick="switchMsg('whatsapp',this)">WhatsApp</button>
      <button class="msg-tab" onclick="switchMsg('loom',this)">Loom Script</button>
    </div>
    <textarea class="modal-textarea" id="outreachText" rows="8"></textarea>
    <div class="modal-footer">
      <button class="btn btn-sm" onclick="copyOutreach()">Copy</button>
      <button class="btn btn-sm btn-primary" onclick="closeOutreach()">Done</button>
    </div>
  </div>
</div>

<script>
// ── STATE ─────────────────────────────────────────────────────────
let analysisData  = null;
let currentSlide  = 0;
let currentMsgType = 'whatsapp';
let placeData     = null;  // { place_id, name, address, rating, review_count }
const SLIDE_LABELS = ['Insight','Competitors','The Gap','Visibility','Cost','Opportunity','How It Works','Book a Call'];
const API = '/api/audit';

// ── TABS ──────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + tab).classList.add('active');
  document.querySelectorAll('.nav-tab')[tab === 'audit' ? 0 : 1].classList.add('active');
  if (tab === 'prospects') loadProspects();
}

// ── SEARCH ────────────────────────────────────────────────────────
async function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  setStatus('Searching…', true);
  document.getElementById('searchResults').innerHTML = '';
  try {
    const r = await fetch(API + '?action=search&query=' + encodeURIComponent(q));
    const data = await r.json();
    const candidates = data.candidates || [];
    setStatus('');
    if (!candidates.length) { setStatus('No results found.'); return; }
    const sr = document.getElementById('searchResults');
    candidates.forEach(c => {
      const el = document.createElement('div');
      el.className = 'result-item';
      el.innerHTML = '<div class="result-name">' + _esc(c.name) + '</div>'
        + '<div class="result-addr">' + _esc(c.formatted_address || '') + '</div>';
      el.onclick = () => selectBusiness(c.place_id, c.name, c.formatted_address);
      sr.appendChild(el);
    });
  } catch (e) { setStatus('Search failed: ' + e.message); }
}

async function selectBusiness(placeId, name, address) {
  document.getElementById('searchResults').innerHTML = '';
  setStatus('Loading business details…', true);
  try {
    const r = await fetch(API + '?action=details&place_id=' + encodeURIComponent(placeId));
    const data = await r.json();
    const biz = data.result || {};
    placeData = {
      place_id: placeId,
      name: biz.name || name,
      address: biz.formatted_address || address,
      rating: biz.rating || 0,
      review_count: biz.user_ratings_total || 0,
      website: biz.website || '',
      phone: biz.formatted_phone_number || '',
    };
    setStatus('');
    runAnalysis();
  } catch (e) { setStatus('Failed to load details: ' + e.message); }
}

function resetToSearch() {
  document.getElementById('deck-ui').style.display = 'none';
  document.getElementById('search-section').style.display = 'block';
  analysisData = null;
  placeData = null;
  currentSlide = 0;
}

// ── ANALYSIS ──────────────────────────────────────────────────────
async function runAnalysis() {
  document.getElementById('search-section').style.display = 'none';
  document.getElementById('deck-ui').style.display = 'none';
  setStatus('Analyzing competitors and generating insights…', true);
  try {
    const r = await fetch(API + '?action=analyze&place_id=' + encodeURIComponent(placeData.place_id), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ biz: { website: placeData.website, phone: placeData.phone } }),
    });
    const data = await r.json();
    if (data.error) throw new Error(data.error);
    analysisData = { ...data, ...placeData };
    setStatus('');
    showDeck();
  } catch (e) {
    setStatus('Analysis failed: ' + e.message);
    document.getElementById('search-section').style.display = 'block';
  }
}

// ── DECK ──────────────────────────────────────────────────────────
function showDeck() {
  document.getElementById('search-section').style.display = 'none';
  const d = analysisData;
  document.getElementById('deck-biz-name').textContent = d.name;
  document.getElementById('deck-biz-meta').textContent =
    '\u2605 ' + (d.biz_rating || d.rating || 0) + '  \u00b7  '
    + (d.biz_reviews || d.review_count || 0) + ' reviews  \u00b7  '
    + (d.category || '')
    + (d.map_pack_score != null ? '  \u00b7  Map Score: ' + d.map_pack_score + '/100' : '');

  buildSidebar();
  currentSlide = 0;
  renderSlide(0);
  document.getElementById('deck-ui').style.display = 'flex';
  document.getElementById('saveBtn').textContent = '+ Save';
  document.getElementById('saveBtn').disabled = false;
}

function buildSidebar() {
  const sb = document.getElementById('slideSidebar');
  sb.innerHTML = '';
  SLIDE_LABELS.forEach((label, i) => {
    const el = document.createElement('div');
    el.className = 'slide-nav-item' + (i === 0 ? ' active' : '');
    el.id = 'sni-' + i;
    el.innerHTML = '<span class="sni-num">' + (i + 1) + '</span><span class="sni-label">' + label + '</span>';
    el.onclick = () => { currentSlide = i; renderSlide(i); };
    sb.appendChild(el);
  });
}

function goDeck(dir) {
  const n = Math.max(0, Math.min(7, currentSlide + dir));
  if (n !== currentSlide) { currentSlide = n; renderSlide(n); }
}

function renderSlide(idx) {
  document.querySelectorAll('.slide-nav-item').forEach((el, i) => el.classList.toggle('active', i === idx));
  document.getElementById('deckCounter').textContent = (idx + 1) + ' / 8';
  const html = buildSlideHTML(idx, analysisData);
  document.getElementById('slideStage').innerHTML = html;
}

function buildSlideHTML(idx, d) {
  const slides = d.slides || [];
  const s = slides[idx] || {};
  const title = s.title || SLIDE_LABELS[idx];
  const content = s.content || '';
  const support = s.supporting_text || '';

  switch (idx) {
    case 0: return slideInsight(title, content, support, d);
    case 1: return slideComparison(title, d);
    case 2: return slideGap(title, content, support, d);
    case 3: return slideVisibility(title, content, support);
    case 4: return slideCost(title, content, support, d);
    case 5: return slideOpportunity(title, content, support, d);
    case 6: return slideHowItWorks(title, d);
    case 7: return slideCTA(title, content, support);
    default: return slideGeneric(title, content, support);
  }
}

function slideInsight(title, content, support, d) {
  return '<div class="slide slide-insight">'
    + '<div class="s-eyebrow">Audit Finding</div>'
    + '<div class="s-headline">' + _esc(d.insight_summary || content || title) + '</div>'
    + (support ? '<div class="s-highlight">' + _esc(support) + '</div>' : '')
    + '</div>';
}

function slideComparison(title, d) {
  const bizReviews = d.biz_reviews || d.review_count || 0;
  const bizRating  = d.biz_rating  || d.rating || 0;
  const comps = d.competitors || [];
  const maxReviews = Math.max(bizReviews, ...comps.map(c => c.review_count));

  let rows = '<tr class="you"><td><strong>' + _esc(d.name) + '</strong> <span style="font-size:11px;color:var(--gold);font-weight:700;">YOU</span></td>'
    + '<td class="stars">' + starsHtml(bizRating) + ' ' + bizRating + '</td>'
    + '<td><div class="review-bar-wrap"><div class="review-bar" style="width:' + barPct(bizReviews, maxReviews) + 'px"></div><span>' + bizReviews + '</span></div></td></tr>';
  comps.forEach(c => {
    rows += '<tr><td>' + _esc(c.name) + '</td>'
      + '<td class="stars">' + starsHtml(c.rating) + ' ' + c.rating + '</td>'
      + '<td><div class="review-bar-wrap"><div class="review-bar" style="width:' + barPct(c.review_count, maxReviews) + 'px;background:#ddd"></div><span>' + c.review_count + '</span></div></td></tr>';
  });

  return '<div class="slide slide-comparison">'
    + '<div class="s-title">' + _esc(title) + '</div>'
    + '<table class="comp-table"><thead><tr><th>Business</th><th>Rating</th><th>Reviews</th></tr></thead>'
    + '<tbody>' + rows + '</tbody></table>'
    + '</div>';
}

function slideGap(title, content, support, d) {
  const ratio = d.dominance_ratio || 1;
  const dispRatio = ratio >= 10 ? Math.round(ratio) : ratio.toFixed(1);
  return '<div class="slide slide-gap">'
    + '<div class="s-eyebrow">The Gap</div>'
    + '<div class="s-big-num">' + dispRatio + 'x</div>'
    + '<div class="s-big-label">' + _esc(content || 'Fewer reviews than top competitors') + '</div>'
    + '<div class="s-support">' + _esc(support || 'This gap directly affects how often you appear when customers search locally.') + '</div>'
    + '</div>';
}

function slideVisibility(title, content, support) {
  return '<div class="slide slide-visibility">'
    + '<div class="s-title">' + _esc(title) + '</div>'
    + '<div class="s-quote">' + _esc(content || 'Google tends to favor businesses that consistently get reviews. More reviews = more visibility = more customers choosing you.') + '</div>'
    + (support ? '<div class="s-support">' + _esc(support) + '</div>' : '')
    + '</div>';
}

function slideCost(title, content, support, d) {
  const rev = d.revenue_range || '€30–€80';
  const avgComp = d.avg_competitor_reviews || 0;
  const biz = d.biz_reviews || d.review_count || 0;
  const gap = Math.max(0, avgComp - biz);
  return '<div class="slide slide-cost">'
    + '<div class="s-title">' + _esc(title) + '</div>'
    + '<div class="s-money">' + rev + '</div>'
    + '<div class="s-money-label">average value per customer in your category</div>'
    + '<div class="s-support">' + _esc(content || ('With ' + gap + ' fewer reviews than your top competitors, you\'re likely missing customers every week who are choosing them instead.')) + '</div>'
    + (support ? '<div style="margin-top:.75rem;font-size:.9rem;color:var(--muted);">' + _esc(support) + '</div>' : '')
    + '</div>';
}

function slideOpportunity(title, content, support, d) {
  const rev = d.revenue_range || '€30–€80';
  return '<div class="slide slide-opportunity">'
    + '<div class="s-title">' + _esc(title) + '</div>'
    + '<div class="s-money">' + rev + '</div>'
    + '<div class="s-money-label">per new customer you could be winning back</div>'
    + '<div class="s-support">' + _esc(content || 'Close the review gap and Google starts showing your business to more people searching locally — customers who are ready to buy.') + '</div>'
    + (support ? '<div style="margin-top:.75rem;font-size:.9rem;color:var(--muted);">' + _esc(support) + '</div>' : '')
    + '</div>';
}

function slideHowItWorks(title, d) {
  const slides = (d.slides || [])[6] || {};
  const steps = slides.content ? slides.content.split('\n').filter(Boolean) : null;
  const s1 = (steps && steps[0]) || 'More Reviews';
  const s2 = (steps && steps[1]) || 'More Visibility';
  const s3 = (steps && steps[2]) || 'More Customers';
  const sub1 = (steps && steps[3]) || 'Customer gets a prompt after their visit';
  const sub2 = (steps && steps[4]) || 'Google ranks you higher locally';
  const sub3 = (steps && steps[5]) || 'Revenue grows automatically';
  return '<div class="slide slide-how">'
    + '<div class="s-title">' + _esc(title) + '</div>'
    + '<div class="how-steps">'
    + '<div class="how-step"><div class="how-step-num">1</div><div class="how-step-label">' + _esc(s1) + '</div><div class="how-step-sub">' + _esc(sub1) + '</div></div>'
    + '<div class="how-arrow">&rarr;</div>'
    + '<div class="how-step"><div class="how-step-num">2</div><div class="how-step-label">' + _esc(s2) + '</div><div class="how-step-sub">' + _esc(sub2) + '</div></div>'
    + '<div class="how-arrow">&rarr;</div>'
    + '<div class="how-step"><div class="how-step-num">3</div><div class="how-step-label">' + _esc(s3) + '</div><div class="how-step-sub">' + _esc(sub3) + '</div></div>'
    + '</div></div>';
}

function slideCTA(title, content, support) {
  return '<div class="slide slide-cta">'
    + '<div class="s-eyebrow">Next Step</div>'
    + '<div class="s-headline">' + _esc(title || 'Ready to Fix This?') + '</div>'
    + '<div class="s-sub">' + _esc(content || support || 'Book a free 20-minute call. We\'ll show you exactly what to do.') + '</div>'
    + '<button class="btn-cta" onclick="window.open(\'https://growstars.com/book\',\'_blank\')">Book a Free Call</button>'
    + '</div>';
}

function slideGeneric(title, content, support) {
  return '<div class="slide" style="background:var(--white)">'
    + '<div style="font-family:Georgia,serif;font-size:1.8rem;margin-bottom:1.25rem">' + _esc(title) + '</div>'
    + '<div style="font-size:1.05rem;line-height:1.7;color:var(--text)">' + _esc(content) + '</div>'
    + (support ? '<div style="margin-top:1rem;font-size:.9rem;color:var(--muted)">' + _esc(support) + '</div>' : '')
    + '</div>';
}

// ── PRESENTATION MODE ─────────────────────────────────────────────
let presSlide = 0;
function enterPresentation() {
  presSlide = currentSlide;
  renderPresSlide(presSlide);
  document.getElementById('pres-overlay').classList.add('open');
}
function exitPresentation() {
  document.getElementById('pres-overlay').classList.remove('open');
}
function goPres(dir) {
  presSlide = Math.max(0, Math.min(7, presSlide + dir));
  renderPresSlide(presSlide);
}
function renderPresSlide(idx) {
  document.getElementById('presCounter').textContent = (idx + 1) + ' / 8';
  document.getElementById('pres-slide-wrap').innerHTML = buildSlideHTML(idx, analysisData);
}
document.addEventListener('keydown', e => {
  if (!document.getElementById('pres-overlay').classList.contains('open')) return;
  if (e.key === 'ArrowRight' || e.key === ' ') goPres(1);
  else if (e.key === 'ArrowLeft') goPres(-1);
  else if (e.key === 'Escape') exitPresentation();
});

// ── COPY ──────────────────────────────────────────────────────────
function copyWhatsApp() {
  if (!analysisData?.whatsapp_message) return;
  navigator.clipboard.writeText(analysisData.whatsapp_message).then(() => {
    const btn = document.getElementById('copyWaBtn');
    btn.textContent = '✓ Copied!';
    setTimeout(() => { btn.textContent = '📋 WhatsApp'; }, 2000);
  });
}
function copyLoom() {
  if (!analysisData) return;
  const text = typeof analysisData.loom_script === 'object'
    ? JSON.stringify(analysisData.loom_script, null, 2)
    : (analysisData.loom_script || '');
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyLoomBtn');
    btn.textContent = '✓ Copied!';
    setTimeout(() => { btn.textContent = '📋 Loom Script'; }, 2000);
  });
}

// ── OUTREACH MODAL ────────────────────────────────────────────────
function openOutreach() {
  if (!analysisData) return;
  currentMsgType = 'whatsapp';
  document.querySelector('.msg-tab').classList.add('active');
  document.querySelectorAll('.msg-tab')[1].classList.remove('active');
  document.getElementById('outreachSub').textContent = analysisData.name;
  document.getElementById('outreachText').value = analysisData.whatsapp_message || '';
  document.getElementById('outreachModal').classList.add('open');
}
function closeOutreach() { document.getElementById('outreachModal').classList.remove('open'); }
function switchMsg(type, btn) {
  currentMsgType = type;
  document.querySelectorAll('.msg-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  const d = analysisData || {};
  if (type === 'whatsapp') {
    document.getElementById('outreachText').value = d.whatsapp_message || '';
  } else {
    document.getElementById('outreachText').value = typeof d.loom_script === 'object'
      ? JSON.stringify(d.loom_script, null, 2)
      : (d.loom_script || '');
  }
}
function copyOutreach() {
  const t = document.getElementById('outreachText');
  navigator.clipboard.writeText(t.value);
}

// ── PDF EXPORT ────────────────────────────────────────────────────
async function exportPDF() {
  if (!analysisData) return;
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
  const W = 297, H = 210, margin = 20;

  const slides = analysisData.slides || [];
  const d = analysisData;

  slides.forEach((s, i) => {
    if (i > 0) doc.addPage();
    // Background
    if (i === 2 || i === 7) {
      doc.setFillColor(26, 26, 26);
    } else {
      doc.setFillColor(255, 253, 248);
    }
    doc.rect(0, 0, W, H, 'F');

    // Slide number
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(9);
    doc.setTextColor(i === 2 || i === 7 ? 120 : 160, i === 2 || i === 7 ? 110 : 150, i === 2 || i === 7 ? 90 : 130);
    doc.text((i + 1) + ' / ' + slides.length, W - margin, H - 10, { align: 'right' });

    const isLight = !(i === 2 || i === 7);
    const titleColor = isLight ? [26, 26, 26] : [245, 242, 236];
    const bodyColor  = isLight ? [107, 101, 96] : [180, 170, 155];
    const goldColor  = [200, 169, 110];

    // Title
    doc.setFont('times', 'bold');
    doc.setFontSize(22);
    doc.setTextColor(...titleColor);
    doc.text(s.title || SLIDE_LABELS[i], margin, 45);

    // Content
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(13);
    doc.setTextColor(...bodyColor);
    const lines = doc.splitTextToSize(s.content || '', W - margin * 2);
    doc.text(lines, margin, 65);

    // Supporting text
    if (s.supporting_text) {
      doc.setFontSize(11);
      doc.setTextColor(...goldColor);
      const sLines = doc.splitTextToSize(s.supporting_text, W - margin * 2);
      doc.text(sLines, margin, 65 + lines.length * 7 + 8);
    }

    // Footer
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(8);
    doc.setTextColor(...bodyColor);
    doc.text('GrowStars.com', margin, H - 10);
  });

  const safeName = (d.name || 'audit').replace(/[^a-z0-9]/gi, '_').toLowerCase();
  doc.save('growstars_' + safeName + '.pdf');
}

// ── SAVE PROSPECT ─────────────────────────────────────────────────
async function saveProspect() {
  if (!analysisData) return;
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = 'Saving…';
  try {
    const payload = {
      business_name:    analysisData.name,
      address:          analysisData.address,
      place_id:         analysisData.place_id,
      rating:           analysisData.biz_rating || analysisData.rating,
      review_count:     analysisData.biz_reviews || analysisData.review_count,
      website:          analysisData.website,
      phone:            analysisData.phone,
      score:            analysisData.map_pack_score,
      gap_level:        analysisData.gap_level,
      dominance_ratio:  analysisData.dominance_ratio,
      category:         analysisData.category,
      insight_summary:  analysisData.insight_summary,
      whatsapp_message: analysisData.whatsapp_message,
      status:           'new',
    };
    const r = await fetch(API + '?action=save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await r.json();
    if (data.error) throw new Error(data.error);
    btn.textContent = '✓ Saved';
    btn.style.color = 'var(--green)';
  } catch (e) {
    btn.disabled = false;
    btn.textContent = '+ Save';
    alert('Save failed: ' + e.message);
  }
}

// ── PROSPECTS ─────────────────────────────────────────────────────
async function loadProspects() {
  try {
    const r = await fetch(API + '?action=prospects');
    const data = await r.json();
    renderProspects(Array.isArray(data) ? data : []);
  } catch (e) {
    document.getElementById('prospectsContainer').innerHTML =
      '<div style="color:var(--muted);font-size:14px">Failed to load: ' + _esc(e.message) + '</div>';
  }
}

function renderProspects(prospects) {
  const container = document.getElementById('prospectsContainer');
  if (!prospects.length) {
    container.innerHTML = '<div style="color:var(--muted);font-size:14px;padding:2rem 0">No prospects saved yet. Run an audit and click Save.</div>';
    return;
  }

  const statuses = ['new','contacted','viewed','booked','lost'];
  const statusLabels = { new:'New', contacted:'Contacted', viewed:'Viewed', booked:'Booked', lost:'Lost' };
  const cols = {};
  statuses.forEach(s => { cols[s] = []; });
  prospects.forEach(p => { const s = p.status || 'new'; if (cols[s]) cols[s].push(p); else cols['new'].push(p); });

  let html = '<div class="pipeline">';
  statuses.forEach(status => {
    html += '<div class="pipe-col">'
      + '<div class="pipe-col-title">' + statusLabels[status]
      + '<span class="pipe-col-count">' + cols[status].length + '</span></div>';
    cols[status].forEach(p => {
      const scoreClass = p.gap_level === 'high' ? 'score-high' : p.gap_level === 'medium' ? 'score-medium' : 'score-low';
      html += '<div class="pipe-card" onclick="showProspectDetail(' + JSON.stringify(p).replace(/"/g,'&quot;') + ')">'
        + '<div class="pipe-card-name">' + _esc(p.business_name) + '</div>'
        + '<div class="pipe-card-meta">' + _esc((p.rating || '') + ' \u2605  \u00b7  ' + (p.review_count || 0) + ' reviews') + '</div>'
        + (p.gap_level ? '<span class="pipe-card-score ' + scoreClass + '">' + (p.gap_level) + ' gap</span>' : '')
        + '</div>';
    });
    html += '</div>';
  });
  html += '</div>';

  html += '<div class="prospects-list">';
  prospects.forEach(p => {
    html += '<div class="prospect-row">'
      + '<div style="flex:1;min-width:0"><div class="pr-name">' + _esc(p.business_name) + '</div>'
      + '<div class="pr-meta">' + _esc(p.address || '') + '</div></div>'
      + '<div class="pr-meta">' + _esc((p.rating || '') + ' \u2605') + '</div>'
      + '<div><select onchange="updateStatus(\'' + p.id + '\',this.value)" onclick="event.stopPropagation()">'
      + statuses.map(s => '<option value="' + s + '"' + (p.status === s ? ' selected' : '') + '>' + statusLabels[s] + '</option>').join('')
      + '</select></div>'
      + '<button class="pr-del" onclick="deleteProspect(\'' + p.id + '\')" title="Delete">&times;</button>'
      + '</div>';
  });
  html += '</div>';
  container.innerHTML = html;
}

async function updateStatus(id, status) {
  await fetch(API + '?action=update&id=' + encodeURIComponent(id), {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ status }),
  });
}

async function deleteProspect(id) {
  if (!confirm('Delete this prospect?')) return;
  await fetch(API + '?action=delete&id=' + encodeURIComponent(id));
  loadProspects();
}

function showProspectDetail(p) {
  if (!p.whatsapp_message) return;
  navigator.clipboard.writeText(p.whatsapp_message).then(() => alert('WhatsApp message copied!'));
}

// ── HELPERS ───────────────────────────────────────────────────────
function _esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function setStatus(msg, loading) {
  const el = document.getElementById('status-line');
  el.innerHTML = (loading ? '<div class="spinner"></div>' : '') + _esc(msg);
}
function starsHtml(rating) {
  const full = Math.round(rating || 0);
  return '\u2605'.repeat(Math.min(5, Math.max(0, full)));
}
function barPct(val, max) {
  if (!max) return 0;
  return Math.round((val / max) * 140);
}

document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});
