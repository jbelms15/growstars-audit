<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GrowStars — Lead Runner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #fffdf8;
      --white: #ffffff;
      --surface: #f7f5f0;
      --border: rgba(0,0,0,0.09);
      --border2: rgba(0,0,0,0.16);
      --text: #1a1a1a;
      --muted: #6b6560;
      --gold: #c8a96e;
      --gold-dim: rgba(200,169,110,0.15);
      --gold-dark: #a8863e;
    }

    html { background: #f7f7f7; color: var(--text); font-family: 'DM Sans', Arial, sans-serif; font-size: 16px; line-height: 1.6; }
    body { min-height: 100vh; display: flex; flex-direction: column; }

    /* ── NAV ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 16px 24px;
      position: absolute;
      top: 0; right: 0;
      z-index: 20;
    }

    .nav-link {
      font-size: 12px;
      color: #999;
      text-decoration: none;
      padding: 5px 12px;
      border-radius: 7px;
      border: 1px solid #ddd;
      background: var(--white);
      font-weight: 500;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .nav-link:hover { background: #eee; color: #555; }

    /* ── HERO ── */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 80px 20px 40px;
    }

    .hero-brand {
      font-family: Georgia, serif;
      font-size: 13px;
      color: var(--gold);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .hero h1 {
      font-family: Georgia, serif;
      font-size: 32px;
      font-weight: normal;
      color: var(--text);
      line-height: 1.25;
      margin-bottom: 14px;
      max-width: 520px;
    }

    .hero p {
      font-size: 15px;
      color: var(--muted);
      max-width: 440px;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    /* ── INPUT GROUP ── */
    .input-group {
      width: 100%;
      max-width: 560px;
      display: flex;
      gap: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      border-radius: 12px;
      background: var(--white);
      padding: 6px 6px 6px 14px;
      border: 1px solid #e0e0e0;
    }

    .input-group input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 15px;
      font-family: inherit;
      color: var(--text);
      background: transparent;
      padding: 6px 0;
    }

    .input-group input::placeholder { color: #b0b0b0; }

    .input-group button {
      padding: 10px 20px;
      font-size: 14px;
      font-family: inherit;
      font-weight: 600;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
      flex-shrink: 0;
    }

    .input-group button:hover { opacity: 0.82; }
    .input-group button:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── STATUS ── */
    #status {
      max-width: 600px;
      margin: 16px auto 0;
      padding: 0 20px;
      font-size: 13px;
      color: var(--muted);
      min-height: 20px;
      text-align: center;
    }

    /* ── LEADS ── */
    #leads {
      max-width: 620px;
      margin: 24px auto 64px;
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .lead-card {
      background: var(--white);
      border: 1px solid rgba(0,0,0,0.09);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .lead-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .lead-name {
      font-size: 15px;
      font-weight: 600;
    }

    .lead-meta {
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
    }

    .lead-observation {
      font-size: 13px;
      color: #444;
      line-height: 1.55;
      margin-bottom: 16px;
      padding: 10px 12px;
      background: var(--gold-dim);
      border-left: 3px solid var(--gold);
      border-radius: 0 6px 6px 0;
    }

    .message-block { margin-bottom: 12px; }

    .message-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 5px;
    }

    .message-text {
      font-size: 13px;
      color: #333;
      line-height: 1.6;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 10px 12px;
      white-space: pre-wrap;
    }

    .lead-actions {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }

    .copy-btn {
      font-size: 13px;
      font-family: inherit;
      font-weight: 500;
      padding: 7px 14px;
      border-radius: 7px;
      border: 1px solid var(--border2);
      background: var(--white);
      color: var(--text);
      cursor: pointer;
      transition: all 0.15s;
    }

    .copy-btn:hover { background: var(--surface); }
    .copy-btn.copied { background: #f0faf4; border-color: #a8d8b8; color: #2a7a4a; }

    .lead-footer {
      margin-top: 12px;
      font-size: 12px;
      color: #bbb;
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    .lead-footer a { color: #bbb; text-decoration: none; }
    .lead-footer a:hover { color: var(--muted); }

    .empty-state {
      text-align: center;
      padding: 48px 0;
      color: var(--muted);
      font-size: 14px;
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-link" href="execution-panel.html" target="_blank">Execution Panel ↗</a>
</nav>

<div class="hero">
  <div class="hero-brand">GrowStars</div>
  <h1>Find High-Intent Hair Salon Leads</h1>
  <p>Instantly generate qualified local businesses with ready-to-send outreach messages.</p>
  <div class="input-group">
    <input type="text" id="city-input" placeholder="Enter city, e.g. Leeds" />
    <button id="generate-btn" onclick="generateLeads()">Generate Leads</button>
  </div>
</div>

<div id="status"></div>
<div id="leads"></div>

<script>
  const ICP = {
    search_queries: ["hair salon", "hairdresser", "barber shop"],
    min_reviews: 30,
    max_reviews: 400,
  };

  const cityInput   = document.getElementById('city-input');
  const generateBtn = document.getElementById('generate-btn');
  const statusEl    = document.getElementById('status');
  const leadsEl     = document.getElementById('leads');

  cityInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') generateLeads();
  });

  async function generateLeads() {
    const city = cityInput.value.trim();
    if (!city) { cityInput.focus(); return; }

    generateBtn.disabled = true;
    generateBtn.textContent = 'Generating…';
    statusEl.textContent = 'Generating leads…';
    leadsEl.innerHTML = '';

    try {
      const res = await fetch('/api/hitlist', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ city, icp: ICP, limit: 20 }),
      });

      const data = await res.json();

      if (!res.ok) {
        statusEl.textContent = 'Error: ' + (data.error || res.statusText);
        return;
      }

      const hits = data.hits || [];
      statusEl.textContent = hits.length
        ? `${hits.length} lead${hits.length !== 1 ? 's' : ''} found in ${city}`
        : `No leads found in ${city} matching the ICP.`;

      if (hits.length === 0) {
        leadsEl.innerHTML = '<div class="empty-state">No leads matched. Try a different city.</div>';
        return;
      }

      leadsEl.innerHTML = hits.map((lead, i) => renderCard(lead, i)).join('');

    } catch (err) {
      statusEl.textContent = 'Request failed: ' + err.message;
    } finally {
      generateBtn.disabled = false;
      generateBtn.textContent = 'Generate Leads';
    }
  }

  function renderCard(lead, i) {
    const wa   = escHtml(lead.whatsapp_message || '');
    const loom = escHtml(lead.loom_hook || '');
    const obs  = escHtml(lead.observation || '');
    const name = escHtml(lead.name || '');

    return `
      <div class="lead-card" id="card-${i}">
        <div class="lead-header">
          <div class="lead-name">${name}</div>
          <div class="lead-meta">${lead.rating} ⭐ &nbsp;•&nbsp; ${lead.reviews} reviews</div>
        </div>
        <div class="lead-observation">${obs}</div>
        <div class="message-block">
          <div class="message-label">WhatsApp</div>
          <div class="message-text">${wa}</div>
        </div>
        <div class="message-block">
          <div class="message-label">Loom Hook</div>
          <div class="message-text">${loom}</div>
        </div>
        <div class="lead-actions">
          <button class="copy-btn" onclick="copyText(this, ${JSON.stringify(lead.whatsapp_message)})">Copy WhatsApp</button>
          <button class="copy-btn" onclick="copyText(this, ${JSON.stringify(lead.loom_hook)})">Copy Loom</button>
        </div>
        <div class="lead-footer">
          ${lead.phone ? `<span>${escHtml(lead.phone)}</span>` : ''}
          ${lead.website ? `<a href="${escHtml(lead.website)}" target="_blank">${escHtml(lead.website)}</a>` : ''}
          <a href="${escHtml(lead.maps_link)}" target="_blank">Google Maps ↗</a>
        </div>
      </div>`;
  }

  function copyText(btn, text) {
    navigator.clipboard.writeText(text).then(() => {
      const orig = btn.textContent;
      btn.textContent = 'Copied ✔';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = orig;
        btn.classList.remove('copied');
      }, 2000);
    });
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>

</body>
</html>
